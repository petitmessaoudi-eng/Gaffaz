<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; script-src-attr 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob:; connect-src 'self';">
<title>ComparateurTN</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;600;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --red:#C0001A;--red-dark:#8B0000;--red-glow:rgba(192,0,26,0.4);--red-subtle:rgba(192,0,26,0.1);--red-border:rgba(192,0,26,0.3);
  --radius:4px;--transition:0.2s ease;--transition-slow:0.3s ease;
}
[data-theme="dark"]{
  --bg-overlay:rgba(5,5,5,0.78);--card-bg:rgba(12,12,12,0.88);--card-border:rgba(255,255,255,0.07);
  --input-bg:rgba(255,255,255,0.05);--input-border:rgba(255,255,255,0.12);
  --text-primary:#f5f5f5;--text-secondary:rgba(245,245,245,0.65);--text-muted:rgba(245,245,245,0.38);
  --divider:rgba(255,255,255,0.07);--pill-bg:rgba(255,255,255,0.06);--pill-border:rgba(255,255,255,0.1);
}
[data-theme="light"]{
  --bg-overlay:rgba(255,255,255,0.82);--card-bg:rgba(255,255,255,0.92);--card-border:rgba(0,0,0,0.09);
  --input-bg:rgba(0,0,0,0.04);--input-border:rgba(0,0,0,0.14);
  --text-primary:#111111;--text-secondary:rgba(17,17,17,0.7);--text-muted:rgba(17,17,17,0.45);
  --divider:rgba(0,0,0,0.08);--pill-bg:rgba(0,0,0,0.04);--pill-border:rgba(0,0,0,0.1);
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;overflow-x:hidden;}
body{
  font-family:'Outfit',sans-serif;color:var(--text-primary);
  min-height:100vh;overflow-x:hidden;
  display:flex;align-items:center;justify-content:center;
  opacity:0;transition:opacity .3s ease;padding:24px 16px;
}
a{text-decoration:none;color:inherit;}
::-webkit-scrollbar{width:5px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--red-border);border-radius:3px;}
.page-bg{
  position:fixed;inset:0;z-index:-2;
  background-size:cover;background-position:center top;background-repeat:no-repeat;
}
[data-theme="dark"] .page-bg{background-image:url('dark.jpg');}
[data-theme="light"] .page-bg{background-image:url('light.jpg');}
.page-overlay{
  position:fixed;inset:0;z-index:-1;
  background:var(--bg-overlay);backdrop-filter:blur(3px);-webkit-backdrop-filter:blur(3px);
  transition:background var(--transition-slow);
}
.noise-overlay{
  position:fixed;inset:0;z-index:9998;pointer-events:none;opacity:0.03;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
  background-repeat:repeat;background-size:200px 200px;
}
#cursor-glow{
  position:fixed;width:280px;height:280px;border-radius:50%;
  background:radial-gradient(circle,rgba(192,0,26,0.08) 0%,transparent 70%);
  pointer-events:none;z-index:9997;transform:translate(-50%,-50%);transition:opacity .3s;
}
.theme-btn{
  position:fixed;top:18px;right:18px;z-index:300;
  background:var(--card-bg);backdrop-filter:blur(12px);border:1px solid var(--card-border);
  border-radius:var(--radius);color:var(--text-secondary);cursor:pointer;
  padding:7px 14px;font-family:'Rajdhani',sans-serif;font-size:0.75rem;font-weight:700;letter-spacing:1px;
  transition:all var(--transition);
}
.theme-btn:hover{border-color:var(--red);color:var(--red);}
.card-wrap{width:100%;max-width:460px;animation:fadeUp .65s ease-out;}
@keyframes fadeUp{from{opacity:0;transform:translateY(28px)}to{opacity:1;transform:translateY(0)}}
.card{
  background:var(--card-bg);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border:1px solid var(--card-border);border-radius:var(--radius);
  padding:36px 36px 28px;position:relative;overflow:hidden;
  box-shadow:0 24px 60px rgba(0,0,0,0.45),0 0 0 1px rgba(255,255,255,0.04) inset;
}
.card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,var(--red),transparent);
}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-7px)}40%{transform:translateX(7px)}60%{transform:translateX(-4px)}80%{transform:translateX(4px)}}
.shake{animation:shake .4s ease;}
.logo-wrap{text-align:center;margin-bottom:24px;}
.logo-icon{
  width:56px;height:56px;border-radius:var(--radius);
  background:linear-gradient(135deg,#059669,#d4a574);
  display:flex;align-items:center;justify-content:center;
  font-family:'Bebas Neue',sans-serif;font-size:28px;color:#fff;
  margin:0 auto 10px;box-shadow:0 8px 28px rgba(5,150,105,0.4);
}
.logo-name{
  font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:3px;
  color:var(--text-primary);position:relative;display:inline-block;padding-bottom:3px;
}
.logo-name::after{
  content:'';position:absolute;bottom:0;left:0;width:100%;height:1.5px;
  background:linear-gradient(90deg,var(--red),transparent);box-shadow:0 0 6px var(--red-glow);
}
.logo-name span{color:var(--red);}
.logo-sub{font-family:'Rajdhani',sans-serif;font-size:11px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--text-muted);margin-top:4px;}
.tab-bar{
  display:flex;gap:4px;background:var(--input-bg);border:1px solid var(--input-border);
  border-radius:var(--radius);padding:4px;margin-bottom:24px;overflow:hidden;
}
.tab{
  flex:1;padding:10px 4px;font-family:'Rajdhani',sans-serif;font-size:10px;font-weight:700;
  letter-spacing:0.5px;text-transform:uppercase;border:none;background:transparent;
  color:var(--text-muted);cursor:pointer;border-radius:2px;transition:all var(--transition);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;
  min-width:0;overflow:hidden;
}
.tab svg{width:15px;height:15px;flex-shrink:0;}
.tab span{display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;width:100%;text-align:center;padding:0 2px;}
.tab.active{background:var(--red);color:#fff;box-shadow:0 4px 14px rgba(192,0,26,0.4);}
.tab:not(.active):hover{color:var(--text-primary);background:var(--pill-bg);}
.alert{
  display:flex;align-items:flex-start;gap:10px;padding:11px 14px;
  border-radius:var(--radius);margin-bottom:16px;font-size:13px;font-family:'Rajdhani',sans-serif;font-weight:600;
  opacity:0;transform:translateY(-6px);transition:all .22s ease;pointer-events:none;
}
.alert.visible{opacity:1;transform:translateY(0);pointer-events:all;}
.alert.error{background:rgba(220,38,38,.1);border:1px solid rgba(220,38,38,.25);color:#fca5a5;}
.alert.success{background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.25);color:#86efac;}
.alert.warning{background:rgba(234,179,8,.1);border:1px solid rgba(234,179,8,.25);color:#fde68a;}
.alert svg{width:16px;height:16px;flex-shrink:0;margin-top:1px;}
.form-group{margin-bottom:14px;}
.form-label{
  display:block;font-family:'Rajdhani',sans-serif;font-size:11px;font-weight:700;
  letter-spacing:1.5px;text-transform:uppercase;color:var(--text-secondary);margin-bottom:6px;
}
.input-wrap{position:relative;}
.input-icon{
  position:absolute;left:13px;top:50%;transform:translateY(-50%);
  width:16px;height:16px;color:var(--text-muted);pointer-events:none;transition:color var(--transition);
}
.input-wrap:focus-within .input-icon{color:var(--red);}
.form-input{
  width:100%;padding:12px 44px 12px 40px;
  background:var(--input-bg);border:1.5px solid var(--input-border);border-radius:var(--radius);
  color:var(--text-primary);font-family:'Outfit',sans-serif;font-size:14px;
  transition:all var(--transition);outline:none;
}
.form-input::placeholder{color:var(--text-muted);}
.form-input:focus{border-color:var(--red);background:rgba(192,0,26,0.04);box-shadow:0 0 0 3px rgba(192,0,26,0.12);}
.form-input.err{border-color:#dc2626;box-shadow:0 0 0 3px rgba(220,38,38,0.1);}
.form-input.ok{border-color:#22c55e;box-shadow:0 0 0 3px rgba(34,197,94,0.1);}
.form-input-simple{
  width:100%;padding:12px 16px;
  background:var(--input-bg);border:1.5px solid var(--input-border);border-radius:var(--radius);
  color:var(--text-primary);font-family:'Outfit',sans-serif;font-size:14px;
  transition:all var(--transition);outline:none;
}
.form-input-simple::placeholder{color:var(--text-muted);}
.form-input-simple:focus{border-color:var(--red);background:rgba(192,0,26,0.04);box-shadow:0 0 0 3px rgba(192,0,26,0.12);}
.input-suffix{position:absolute;right:10px;top:50%;transform:translateY(-50%);display:flex;align-items:center;gap:4px;}
.pw-toggle{
  width:28px;height:28px;border:none;background:transparent;cursor:pointer;
  color:var(--text-muted);display:flex;align-items:center;justify-content:center;
  border-radius:2px;transition:all var(--transition);
}
.pw-toggle:hover{color:var(--text-primary);background:var(--pill-bg);}
.pw-toggle svg{width:15px;height:15px;}
.field-err{font-family:'Rajdhani',sans-serif;font-size:11px;font-weight:600;color:#dc2626;margin-top:4px;display:none;}
.field-err.show{display:block;}
.strength-wrap{margin-top:6px;display:none;}
.strength-track{height:3px;background:var(--input-border);border-radius:2px;overflow:hidden;margin-bottom:4px;}
.strength-fill{height:100%;border-radius:2px;transition:width .3s ease,background .3s ease;width:0%;}
.strength-label{font-size:11px;font-weight:700;font-family:'Rajdhani',sans-serif;}
.match-hint{font-family:'Rajdhani',sans-serif;font-size:10px;margin-top:4px;display:none;}
.match-hint.show{display:block;}
.match-hint.ok{color:#22c55e;}
.match-hint.fail{color:#dc2626;}
.submit-btn{
  width:100%;padding:13px;border:none;border-radius:0;
  background:var(--red);color:#fff;font-family:'Rajdhani',sans-serif;font-size:14px;font-weight:700;letter-spacing:2px;text-transform:uppercase;
  cursor:pointer;transition:all var(--transition);
  display:flex;align-items:center;justify-content:center;gap:9px;
  clip-path:polygon(8px 0%,100% 0%,calc(100% - 8px) 100%,0% 100%);
  box-shadow:0 6px 20px rgba(192,0,26,0.35);margin-bottom:14px;
}
.submit-btn:hover{background:var(--red-dark);box-shadow:0 0 24px var(--red-glow),0 8px 24px rgba(0,0,0,0.4);transform:translateY(-1px);}
.submit-btn:active{transform:translateY(0);}
.submit-btn:disabled{opacity:.6;cursor:not-allowed;transform:none;}
.submit-btn svg{width:16px;height:16px;flex-shrink:0;}
.btn-spinner{
  width:16px;height:16px;border:2.5px solid rgba(255,255,255,.3);
  border-top-color:#fff;border-radius:50%;animation:spin 1s linear infinite;flex-shrink:0;
}
@keyframes spin{to{transform:rotate(360deg)}}
.sec-badge{display:flex;align-items:center;justify-content:center;gap:6px;margin-bottom:16px;font-family:'Rajdhani',sans-serif;font-size:10px;font-weight:600;letter-spacing:1px;color:var(--text-muted);}
.sec-badge svg{width:12px;height:12px;color:var(--red);}
.back-link{text-align:center;font-family:'Rajdhani',sans-serif;font-size:12px;font-weight:700;color:var(--text-muted);margin-top:6px;}
.back-link a{color:var(--red);}
.back-link a:hover{text-decoration:underline;}
.card-footer{
  text-align:center;padding-top:14px;border-top:1px solid var(--divider);
  font-family:'Rajdhani',sans-serif;font-size:12px;font-weight:600;color:var(--text-muted);margin-top:8px;
}
.card-footer a{color:var(--red);font-weight:700;}
.card-footer a:hover{text-decoration:underline;}
.store-badges{display:flex;align-items:center;justify-content:center;gap:12px;margin-top:10px;flex-wrap:wrap;}
.s-badge{display:flex;align-items:center;gap:5px;font-family:'Rajdhani',sans-serif;font-size:10px;font-weight:700;letter-spacing:0.5px;color:var(--text-muted);}
.s-dot{width:7px;height:7px;border-radius:50%;}
.verify-icon-wrap{
  width:68px;height:68px;border-radius:50%;margin:0 auto 18px;
  display:flex;align-items:center;justify-content:center;font-size:30px;
}
.verify-icon-wrap.success{background:rgba(34,197,94,.15);border:2px solid rgba(34,197,94,.3);}
.verify-icon-wrap.error{background:rgba(220,38,38,.15);border:2px solid rgba(220,38,38,.3);}
.verify-icon-wrap.pending{background:rgba(192,0,26,.1);border:2px solid rgba(192,0,26,.2);}
.verify-title{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:2px;text-align:center;margin-bottom:10px;}
.verify-desc{font-family:'Rajdhani',sans-serif;font-size:13px;font-weight:600;color:var(--text-secondary);text-align:center;line-height:1.6;margin-bottom:20px;}
.verify-btn-group{display:flex;flex-direction:column;gap:10px;margin-bottom:16px;}
.verify-btn{
  display:flex;align-items:center;justify-content:center;gap:8px;
  padding:12px 24px;border:none;border-radius:0;
  font-family:'Rajdhani',sans-serif;font-size:13px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;
  cursor:pointer;transition:all var(--transition);text-decoration:none;
  clip-path:polygon(6px 0%,100% 0%,calc(100% - 6px) 100%,0% 100%);
}
.verify-btn.primary{background:var(--red);color:#fff;box-shadow:0 6px 20px rgba(192,0,26,0.35);}
.verify-btn.primary:hover{background:var(--red-dark);box-shadow:0 0 24px var(--red-glow);}
.verify-btn.ghost{background:var(--input-bg);border:1.5px solid var(--input-border);color:var(--text-secondary);clip-path:none;border-radius:var(--radius);}
.verify-btn.ghost:hover{border-color:var(--red);color:var(--text-primary);}
.resend-section{padding-top:16px;border-top:1px solid var(--divider);margin-top:8px;}
.resend-section p{font-family:'Rajdhani',sans-serif;font-size:12px;font-weight:600;color:var(--text-muted);text-align:center;margin-bottom:12px;}
.inline-alert{
  padding:10px 14px;border-radius:var(--radius);font-size:12px;font-family:'Rajdhani',sans-serif;font-weight:600;
  margin-bottom:12px;display:none;
}
.inline-alert.visible{display:block;}
.inline-alert.success{background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.25);color:#86efac;}
.inline-alert.error{background:rgba(220,38,38,.1);border:1px solid rgba(220,38,38,.25);color:#fca5a5;}
.tab-panel{display:none;}
.tab-panel.active{display:block;}
@media(max-width:480px){.card{padding:28px 20px 22px;}.tab{font-size:10px;padding:8px 4px;}}
@media(max-width:768px){body{padding:16px 12px;}.card-wrap{max-width:100%;}}
</style>
</head>
<body>
<div class="page-bg"></div>
<div class="page-overlay"></div>
<div class="noise-overlay" aria-hidden="true"></div>
<div id="cursor-glow" aria-hidden="true"></div>

<button class="theme-btn" id="themeBtn" aria-label="Basculer le thème">◐ MODE</button>

<div class="card-wrap">
  <div class="card" id="mainCard">
    <div class="logo-wrap">
      <div class="logo-icon">C</div>
      <div class="logo-name">COMPARATEUR<span>TN</span></div>
      <div class="logo-sub">Comparateur Gaming Tunisie</div>
    </div>

    <div class="tab-bar" role="tablist">
      <button class="tab active" id="tabForgot" role="tab" aria-selected="true" onclick="switchTab('forgot')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg><span>Oublié</span></button>
      <button class="tab" id="tabReset" role="tab" aria-selected="false" onclick="switchTab('reset')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 4v6h-6"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg><span>Nouveau</span></button>
      <button class="tab" id="tabVerify" role="tab" aria-selected="false" onclick="switchTab('verify')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg><span>Vérification</span></button>
    </div>

    <div class="alert" id="mainAlert">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      <span id="alertText"></span>
    </div>

    <div class="tab-panel active" id="panelForgot">
      <div class="form-group">
        <label class="form-label" for="forgotEmail">Adresse e-mail</label>
        <div class="input-wrap">
          <input class="form-input" id="forgotEmail" type="email" placeholder="vous@exemple.com" autocomplete="email" spellcheck="false">
          <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
        </div>
        <div class="field-err" id="forgotEmailErr"></div>
      </div>
      <button class="submit-btn" id="forgotBtn" onclick="handleForgot()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12"/><path d="M22 22l-4-4"/></svg>
        Envoyer le lien
      </button>
      <div class="sec-badge">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
        Lien sécurisé — Expire en 1 heure
      </div>
      <div class="back-link"><a href="/login">← Retour à la connexion</a></div>
    </div>

    <div class="tab-panel" id="panelReset">
      <div id="resetFormContent">
        <div class="form-group">
          <label class="form-label" for="resetPass">Nouveau mot de passe</label>
          <div class="input-wrap">
            <input class="form-input" id="resetPass" type="password" placeholder="••••••••••••" autocomplete="new-password">
            <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            <div class="input-suffix">
              <button class="pw-toggle" id="resetPwToggle1" type="button" aria-label="Voir le mot de passe">
                <svg id="resetEye1" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              </button>
            </div>
          </div>
          <div class="strength-wrap" id="resetStrengthWrap">
            <div class="strength-track"><div class="strength-fill" id="resetStrengthFill"></div></div>
            <span class="strength-label" id="resetStrengthLabel"></span>
          </div>
          <div class="field-err" id="resetPassErr"></div>
        </div>
        <div class="form-group">
          <label class="form-label" for="resetConfirm">Confirmer le mot de passe</label>
          <div class="input-wrap">
            <input class="form-input" id="resetConfirm" type="password" placeholder="••••••••••••" autocomplete="new-password">
            <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            <div class="input-suffix">
              <button class="pw-toggle" id="resetPwToggle2" type="button" aria-label="Voir le mot de passe">
                <svg id="resetEye2" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              </button>
            </div>
          </div>
          <div class="match-hint" id="resetMatchHint"></div>
          <div class="field-err" id="resetConfirmErr"></div>
        </div>
        <button class="submit-btn" id="resetBtn" onclick="handleReset()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          Réinitialiser le mot de passe
        </button>
        <div class="sec-badge">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
          Connexion chiffrée — Session sécurisée
        </div>
        <div class="back-link"><a href="/login">← Retour à la connexion</a></div>
      </div>
    </div>

    <div class="tab-panel" id="panelVerify">
      <div id="verifyContent"></div>
    </div>

    <div class="card-footer">
      <a href="/products">← Retour au comparateur</a>
      <div class="store-badges">
        <span class="s-badge"><span class="s-dot" style="background:#e2001a;"></span>Tunisianet</span>
        <span class="s-badge"><span class="s-dot" style="background:#0066cc;"></span>SpaceNet</span>
        <span class="s-badge"><span class="s-dot" style="background:#ff6600;"></span>Skymil</span>
        <span class="s-badge"><span class="s-dot" style="background:#00933b;"></span>Mytek</span>
      </div>
    </div>
  </div>
</div>

<script>
(function(){
'use strict';

let _currentTab = 'forgot';
const _forgotBtnHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12"/><path d="M22 22l-4-4"/></svg>Envoyer le lien';
const _resetBtnHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>Réinitialiser le mot de passe';

function initTheme() {
  const btn = document.getElementById('themeBtn');
  function applyTheme(t) {
    document.documentElement.setAttribute('data-theme', t);
    localStorage.setItem('theme', t);
    btn.textContent = t === 'dark' ? '◐ MODE' : '☀ MODE';
  }
  applyTheme(localStorage.getItem('theme') || 'dark');
  btn.addEventListener('click', () => applyTheme(document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark'));
}

function initCursor() {
  const g = document.getElementById('cursor-glow');
  if (!g) return;
  document.addEventListener('mousemove', e => { g.style.left = e.clientX + 'px'; g.style.top = e.clientY + 'px'; });
  document.addEventListener('mouseenter', () => { g.style.opacity = '1'; });
  document.addEventListener('mouseleave', () => { g.style.opacity = '0'; });
}

function showAlert(msg, type) {
  const el = document.getElementById('mainAlert');
  const icons = {
    error: '<circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>',
    success: '<polyline points="20 6 9 17 4 12"/>',
    warning: '<path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/>'
  };
  el.className = 'alert ' + (type || 'error') + ' visible';
  el.querySelector('svg').innerHTML = icons[type || 'error'] || icons.error;
  document.getElementById('alertText').textContent = msg;
}

function hideAlert() {
  document.getElementById('mainAlert').className = 'alert';
}

function fieldErr(id, msg) {
  const el = document.getElementById(id);
  if (el) { el.textContent = msg; el.className = 'field-err show'; }
}

function clearErr(id) {
  const el = document.getElementById(id);
  if (el) { el.textContent = ''; el.className = 'field-err'; }
}

function setInputState(id, state) {
  const el = document.getElementById(id);
  if (!el) return;
  el.classList.remove('err', 'ok');
  if (state) el.classList.add(state);
}

function togglePw(inputId, eyeId) {
  const inp = document.getElementById(inputId);
  const icon = document.getElementById(eyeId);
  const show = inp.type === 'password';
  inp.type = show ? 'text' : 'password';
  icon.innerHTML = show
    ? '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>'
    : '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
}

function getStrength(pw) {
  let s = 0;
  if (pw.length >= 8) s++;
  if (pw.length >= 12) s++;
  if (/[A-Z]/.test(pw)) s++;
  if (/[a-z]/.test(pw)) s++;
  if (/[0-9]/.test(pw)) s++;
  if (/[^A-Za-z0-9]/.test(pw)) s++;
  if (s <= 2) return { w: 25, label: 'Faible', color: '#dc2626' };
  if (s <= 3) return { w: 50, label: 'Correct', color: '#d97706' };
  if (s <= 4) return { w: 75, label: 'Fort', color: '#2563eb' };
  return { w: 100, label: 'Très fort', color: '#16a34a' };
}

function checkMatch() {
  const pw = document.getElementById('resetPass');
  const cpw = document.getElementById('resetConfirm');
  const hint = document.getElementById('resetMatchHint');
  if (!pw || !cpw || !hint) return;
  if (!cpw.value) { hint.className = 'match-hint'; return; }
  if (pw.value === cpw.value) { hint.className = 'match-hint ok show'; hint.textContent = '✓ Les mots de passe correspondent'; setInputState('resetConfirm', 'ok'); }
  else { hint.className = 'match-hint fail show'; hint.textContent = '✗ Ne correspondent pas'; setInputState('resetConfirm', 'err'); }
}

function shakeCard() {
  const c = document.getElementById('mainCard');
  c.classList.remove('shake');
  void c.offsetWidth;
  c.classList.add('shake');
  c.addEventListener('animationend', () => c.classList.remove('shake'), { once: true });
}

function navigateTo(href) {
  document.body.style.opacity = '0';
  document.body.style.transition = 'opacity .3s ease';
  setTimeout(() => { window.location.href = href; }, 300);
}

window.switchTab = function(tab) {
  _currentTab = tab;
  hideAlert();
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(b => { b.classList.remove('active'); b.setAttribute('aria-selected', 'false'); });
  const panel = document.getElementById('panel' + tab.charAt(0).toUpperCase() + tab.slice(1));
  if (panel) panel.classList.add('active');
  const tabBtn = document.getElementById('tab' + tab.charAt(0).toUpperCase() + tab.slice(1));
  if (tabBtn) { tabBtn.classList.add('active'); tabBtn.setAttribute('aria-selected', 'true'); }
  const titles = { forgot: 'Mot de passe oublié — ComparateurTN', reset: 'Nouveau mot de passe — ComparateurTN', verify: 'Vérification e-mail — ComparateurTN' };
  document.title = titles[tab] || 'ComparateurTN';
};

window.handleForgot = async function() {
  hideAlert();
  clearErr('forgotEmailErr');
  setInputState('forgotEmail', null);
  const email = document.getElementById('forgotEmail').value.trim();
  if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
    fieldErr('forgotEmailErr', 'Adresse e-mail invalide');
    setInputState('forgotEmail', 'err');
    shakeCard();
    return;
  }
  const btn = document.getElementById('forgotBtn');
  btn.disabled = true;
  btn.innerHTML = '<div class="btn-spinner"></div>Envoi en cours…';
  try {
    const res = await fetch('/auth/forgot-password', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ email }) });
    const data = await res.json();
    document.getElementById('panelForgot').innerHTML = '';
    showAlert(data.message || 'Si ce compte existe, un lien a été envoyé à votre adresse e-mail.', 'success');
  } catch(e) {
    btn.disabled = false;
    btn.innerHTML = _forgotBtnHTML;
    showAlert('Erreur de connexion. Vérifiez votre réseau.', 'error');
  }
};

window.handleReset = async function() {
  hideAlert();
  clearErr('resetPassErr');
  clearErr('resetConfirmErr');
  setInputState('resetPass', null);
  setInputState('resetConfirm', null);
  const params = new URLSearchParams(window.location.search);
  const token = params.get('token');
  if (!token) { showAlert('Token manquant. Veuillez utiliser le lien envoyé par e-mail.', 'error'); return; }
  const pw = document.getElementById('resetPass').value;
  const cpw = document.getElementById('resetConfirm').value;
  let ok = true;
  if (!pw || pw.length < 8) { fieldErr('resetPassErr', 'Min 8 caractères'); setInputState('resetPass', 'err'); ok = false; }
  else if (!/(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[^A-Za-z0-9])/.test(pw)) { fieldErr('resetPassErr', 'Doit contenir majuscule, minuscule, chiffre et symbole'); setInputState('resetPass', 'err'); ok = false; }
  if (pw !== cpw) { fieldErr('resetConfirmErr', 'Les mots de passe ne correspondent pas'); setInputState('resetConfirm', 'err'); ok = false; }
  if (!ok) { shakeCard(); return; }
  const btn = document.getElementById('resetBtn');
  btn.disabled = true;
  btn.innerHTML = '<div class="btn-spinner"></div>Réinitialisation…';
  try {
    const res = await fetch('/auth/reset-password/' + encodeURIComponent(token), { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ password: pw, confirmPassword: cpw }) });
    const data = await res.json();
    if (res.ok && data.success) {
      document.getElementById('resetFormContent').style.display = 'none';
      showAlert('Mot de passe réinitialisé avec succès ! Redirection…', 'success');
      setTimeout(() => navigateTo('/login'), 2500);
    } else {
      btn.disabled = false;
      btn.innerHTML = _resetBtnHTML;
      shakeCard();
      showAlert(data.error || 'Erreur lors de la réinitialisation.', 'error');
    }
  } catch(e) {
    btn.disabled = false;
    btn.innerHTML = _resetBtnHTML;
    showAlert('Erreur de connexion. Vérifiez votre réseau.', 'error');
  }
};

window.handleResend = async function() {
  const emailEl = document.getElementById('resendEmailInput');
  const btn = document.getElementById('resendBtn');
  const alertEl = document.getElementById('resendInlineAlert');
  if (!emailEl || !btn || !alertEl) return;
  const val = emailEl.value.trim();
  alertEl.className = 'inline-alert';
  if (!val || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(val)) {
    alertEl.className = 'inline-alert error visible';
    alertEl.textContent = 'Adresse e-mail invalide';
    return;
  }
  btn.disabled = true;
  btn.innerHTML = '<div class="btn-spinner"></div>Envoi en cours…';
  try {
    const res = await fetch('/auth/resend-verification', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ email: val }) });
    const data = await res.json();
    if (res.ok) {
      alertEl.className = 'inline-alert success visible';
      alertEl.textContent = 'E-mail envoyé ! Vérifiez votre boîte de réception.';
      btn.innerHTML = 'E-mail envoyé ✓';
    } else {
      alertEl.className = 'inline-alert error visible';
      alertEl.textContent = data.error || 'Erreur lors de l\'envoi.';
      btn.disabled = false;
      btn.innerHTML = 'Renvoyer le lien';
    }
  } catch(e) {
    alertEl.className = 'inline-alert error visible';
    alertEl.textContent = 'Erreur de connexion.';
    btn.disabled = false;
    btn.innerHTML = 'Renvoyer le lien';
  }
};

function renderVerifyContent(status, email) {
  const wrap = document.getElementById('verifyContent');
  if (!wrap) return;
  const emailSafe = email ? email.replace(/</g,'&lt;').replace(/>/g,'&gt;') : '';
  const resendBlock = `
    <div class="resend-section">
      <p>Vous n'avez pas reçu l'e-mail ?</p>
      <div class="inline-alert" id="resendInlineAlert"></div>
      <div class="input-wrap" style="margin-bottom:10px;">
        <input class="form-input-simple" id="resendEmailInput" type="email" placeholder="vous@exemple.com" value="${emailSafe}" autocomplete="email">
      </div>
      <button class="submit-btn" id="resendBtn" onclick="handleResend()">
        Renvoyer le lien
      </button>
    </div>`;

  if (status === 'success') {
    wrap.innerHTML = `
      <div class="verify-icon-wrap success" style="font-size:26px;">✓</div>
      <div class="verify-title">E-mail vérifié !</div>
      <div class="verify-desc">Votre adresse e-mail a été vérifiée avec succès. Votre compte est maintenant actif.</div>
      <div class="verify-btn-group">
        <a href="/login" class="verify-btn primary">Se connecter</a>
        <a href="/products" class="verify-btn ghost">Retour au comparateur</a>
      </div>`;
  } else if (status === 'invalid' || status === 'error') {
    wrap.innerHTML = `
      <div class="verify-icon-wrap error" style="font-size:26px;">✗</div>
      <div class="verify-title">Lien invalide ou expiré</div>
      <div class="verify-desc">Ce lien de vérification est invalide ou a expiré. Demandez un nouveau lien ci-dessous.</div>
      ${resendBlock}
      <div class="back-link" style="margin-top:12px;"><a href="/products">← Retour au comparateur</a></div>`;
  } else {
    wrap.innerHTML = `
      <div class="verify-icon-wrap pending" style="font-size:26px;">📧</div>
      <div class="verify-title">Vérifiez votre e-mail</div>
      <div class="verify-desc">Un e-mail de vérification a été envoyé${email ? ' à <strong>' + emailSafe + '</strong>' : ''}. Cliquez sur le lien pour activer votre compte.</div>
      <div class="verify-btn-group">
        <a href="/login" class="verify-btn ghost">Déjà vérifié ? Se connecter</a>
      </div>
      ${resendBlock}`;
  }
}

function initPage() {
  initTheme();
  initCursor();
  const params = new URLSearchParams(window.location.search);
  const pathname = window.location.pathname;
  let tab = params.get('tab') || '';
  if (!tab) {
    if (pathname.includes('reset-password')) tab = 'reset';
    else if (pathname.includes('verify-email')) tab = 'verify';
    else tab = 'forgot';
  }
  const status = params.get('status') || '';
  const email = params.get('email') || '';
  const token = params.get('token') || '';

  renderVerifyContent(status, email);

  if (tab === 'reset' && !token) {
    switchTab('reset');
    showAlert('Lien invalide. Veuillez utiliser le lien envoyé par e-mail.', 'error');
    const fc = document.getElementById('resetFormContent');
    if (fc) fc.style.display = 'none';
  } else {
    switchTab(tab);
  }

  if (tab === 'reset' && email) {
    const passEl = document.getElementById('resetPass');
    if (passEl) passEl.focus();
  }

  const passEl = document.getElementById('resetPass');
  if (passEl) {
    passEl.addEventListener('input', e => {
      const pw = e.target.value;
      const wrap = document.getElementById('resetStrengthWrap');
      const fill = document.getElementById('resetStrengthFill');
      const lbl = document.getElementById('resetStrengthLabel');
      if (pw) { if (wrap) wrap.style.display = 'block'; const s = getStrength(pw); if (fill) { fill.style.width = s.w + '%'; fill.style.background = s.color; } if (lbl) { lbl.textContent = s.label; lbl.style.color = s.color; } }
      else { if (wrap) wrap.style.display = 'none'; }
      clearErr('resetPassErr'); setInputState('resetPass', null); checkMatch();
    });
  }

  const confirmEl = document.getElementById('resetConfirm');
  if (confirmEl) confirmEl.addEventListener('input', () => { clearErr('resetConfirmErr'); setInputState('resetConfirm', null); checkMatch(); });

  const toggle1 = document.getElementById('resetPwToggle1');
  if (toggle1) toggle1.addEventListener('click', () => togglePw('resetPass', 'resetEye1'));
  const toggle2 = document.getElementById('resetPwToggle2');
  if (toggle2) toggle2.addEventListener('click', () => togglePw('resetConfirm', 'resetEye2'));

  const forgotEmailEl = document.getElementById('forgotEmail');
  if (forgotEmailEl) forgotEmailEl.addEventListener('input', () => { clearErr('forgotEmailErr'); setInputState('forgotEmail', null); hideAlert(); });

  document.addEventListener('keydown', e => {
    if (e.key !== 'Enter') return;
    if (_currentTab === 'forgot') handleForgot();
    else if (_currentTab === 'reset') handleReset();
  });

  window.addEventListener('load', () => { document.body.style.opacity = '1'; });
}

if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', initPage);
else initPage();

})();
</script>
</body>
</html>
