<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; script-src-attr 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob:; connect-src 'self';">
<title>Connexion — ComparateurTN</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;600;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --red:#C0001A;--red-dark:#8B0000;--red-glow:rgba(192,0,26,0.4);--red-subtle:rgba(192,0,26,0.1);--red-border:rgba(192,0,26,0.3);
  --radius:4px;--transition:0.2s ease;--transition-slow:0.3s ease;
}
[data-theme="dark"]{
  --bg-overlay:rgba(5,5,5,0.78);--card-bg:rgba(12,12,12,0.88);--card-border:rgba(255,255,255,0.07);
  --input-bg:rgba(255,255,255,0.05);--input-border:rgba(255,255,255,0.12);
  --text-primary:#f5f5f5;--text-secondary:rgba(245,245,245,0.65);--text-muted:rgba(245,245,245,0.38);
  --divider:rgba(255,255,255,0.07);--navbar-bg:rgba(5,5,5,0.95);--pill-bg:rgba(255,255,255,0.06);--pill-border:rgba(255,255,255,0.1);
}
[data-theme="light"]{
  --bg-overlay:rgba(255,255,255,0.82);--card-bg:rgba(255,255,255,0.92);--card-border:rgba(0,0,0,0.09);
  --input-bg:rgba(0,0,0,0.04);--input-border:rgba(0,0,0,0.14);
  --text-primary:#111111;--text-secondary:rgba(17,17,17,0.7);--text-muted:rgba(17,17,17,0.45);
  --divider:rgba(0,0,0,0.08);--navbar-bg:rgba(255,255,255,0.96);--pill-bg:rgba(0,0,0,0.04);--pill-border:rgba(0,0,0,0.1);
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;overflow-x:hidden;}
body{
  font-family:'Outfit',sans-serif;color:var(--text-primary);
  min-height:100vh;overflow-x:hidden;
  display:flex;align-items:center;justify-content:center;
  opacity:0;transition:opacity .3s ease;padding:24px 16px;
}
a{text-decoration:none;color:inherit;}
::-webkit-scrollbar{width:5px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--red-border);border-radius:3px;}
.page-bg{
  position:fixed;inset:0;z-index:-2;
  background-size:cover;background-position:center top;background-repeat:no-repeat;
}
[data-theme="dark"] .page-bg{background-image:url('dark.jpg');}
[data-theme="light"] .page-bg{background-image:url('light.jpg');}
.page-overlay{
  position:fixed;inset:0;z-index:-1;
  background:var(--bg-overlay);backdrop-filter:blur(3px);-webkit-backdrop-filter:blur(3px);
  transition:background var(--transition-slow);
}
.noise-overlay{
  position:fixed;inset:0;z-index:9998;pointer-events:none;opacity:0.03;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
  background-repeat:repeat;background-size:200px 200px;
}
#cursor-glow{
  position:fixed;width:280px;height:280px;border-radius:50%;
  background:radial-gradient(circle,rgba(192,0,26,0.08) 0%,transparent 70%);
  pointer-events:none;z-index:9997;transform:translate(-50%,-50%);transition:opacity .3s;
}
.theme-btn{
  position:fixed;top:18px;right:18px;z-index:300;
  background:var(--card-bg);backdrop-filter:blur(12px);border:1px solid var(--card-border);
  border-radius:var(--radius);color:var(--text-secondary);cursor:pointer;
  padding:7px 14px;font-family:'Rajdhani',sans-serif;font-size:0.75rem;font-weight:700;letter-spacing:1px;
  transition:all var(--transition);
}
.theme-btn:hover{border-color:var(--red);color:var(--red);}
.card-wrap{width:100%;max-width:460px;animation:fadeUp .65s ease-out;}
@keyframes fadeUp{from{opacity:0;transform:translateY(28px)}to{opacity:1;transform:translateY(0)}}
.card{
  background:var(--card-bg);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border:1px solid var(--card-border);border-radius:var(--radius);
  padding:36px 36px 28px;position:relative;overflow:hidden;
  box-shadow:0 24px 60px rgba(0,0,0,0.45),0 0 0 1px rgba(255,255,255,0.04) inset;
}
.card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,var(--red),transparent);
}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-7px)}40%{transform:translateX(7px)}60%{transform:translateX(-4px)}80%{transform:translateX(4px)}}
.shake{animation:shake .4s ease;}
.logo-wrap{text-align:center;margin-bottom:24px;}
.logo-icon{
  width:56px;height:56px;border-radius:var(--radius);
  background:linear-gradient(135deg,#059669,#d4a574);
  display:flex;align-items:center;justify-content:center;
  font-family:'Bebas Neue',sans-serif;font-size:28px;color:#fff;
  margin:0 auto 10px;box-shadow:0 8px 28px rgba(5,150,105,0.4);
}
.logo-name{
  font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:3px;
  color:var(--text-primary);position:relative;display:inline-block;padding-bottom:3px;
}
.logo-name::after{
  content:'';position:absolute;bottom:0;left:0;width:100%;height:1.5px;
  background:linear-gradient(90deg,var(--red),transparent);box-shadow:0 0 6px var(--red-glow);
}
.logo-name span{color:var(--red);}
.logo-sub{font-family:'Rajdhani',sans-serif;font-size:11px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--text-muted);margin-top:4px;}
.tab-bar{
  display:flex;gap:4px;background:var(--input-bg);border:1px solid var(--input-border);
  border-radius:var(--radius);padding:4px;margin-bottom:24px;
}
.tab{
  flex:1;padding:9px;font-family:'Rajdhani',sans-serif;font-size:13px;font-weight:700;
  letter-spacing:1px;text-transform:uppercase;border:none;background:transparent;
  color:var(--text-muted);cursor:pointer;border-radius:2px;transition:all var(--transition);
}
.tab.active{background:var(--red);color:#fff;box-shadow:0 4px 14px rgba(192,0,26,0.4);}
.tab:not(.active):hover{color:var(--text-primary);background:var(--pill-bg);}
.alert{
  display:flex;align-items:flex-start;gap:10px;padding:11px 14px;
  border-radius:var(--radius);margin-bottom:16px;font-size:13px;font-family:'Rajdhani',sans-serif;font-weight:600;
  opacity:0;transform:translateY(-6px);transition:all .22s ease;pointer-events:none;
}
.alert.visible{opacity:1;transform:translateY(0);pointer-events:all;}
.alert.error{background:rgba(220,38,38,.1);border:1px solid rgba(220,38,38,.25);color:#fca5a5;}
.alert.success{background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.25);color:#86efac;}
.alert.warning{background:rgba(234,179,8,.1);border:1px solid rgba(234,179,8,.25);color:#fde68a;}
.alert svg{width:16px;height:16px;flex-shrink:0;margin-top:1px;}
.form-group{margin-bottom:14px;}
.form-label{
  display:block;font-family:'Rajdhani',sans-serif;font-size:11px;font-weight:700;
  letter-spacing:1.5px;text-transform:uppercase;color:var(--text-secondary);margin-bottom:6px;
}
.input-wrap{position:relative;}
.input-icon{
  position:absolute;left:13px;top:50%;transform:translateY(-50%);
  width:16px;height:16px;color:var(--text-muted);pointer-events:none;transition:color var(--transition);
}
.input-wrap:focus-within .input-icon{color:var(--red);}
.form-input{
  width:100%;padding:12px 44px 12px 40px;
  background:var(--input-bg);border:1.5px solid var(--input-border);border-radius:var(--radius);
  color:var(--text-primary);font-family:'Outfit',sans-serif;font-size:14px;
  transition:all var(--transition);outline:none;
}
.form-input::placeholder{color:var(--text-muted);}
.form-input:focus{border-color:var(--red);background:rgba(192,0,26,0.04);box-shadow:0 0 0 3px rgba(192,0,26,0.12);}
.form-input.err{border-color:#dc2626;box-shadow:0 0 0 3px rgba(220,38,38,0.1);}
.form-input.ok{border-color:#22c55e;box-shadow:0 0 0 3px rgba(34,197,94,0.1);}
.input-suffix{position:absolute;right:10px;top:50%;transform:translateY(-50%);display:flex;align-items:center;gap:4px;}
.pw-toggle{
  width:28px;height:28px;border:none;background:transparent;cursor:pointer;
  color:var(--text-muted);display:flex;align-items:center;justify-content:center;
  border-radius:2px;transition:all var(--transition);
}
.pw-toggle:hover{color:var(--text-primary);background:var(--pill-bg);}
.pw-toggle svg{width:15px;height:15px;}
.field-err{font-family:'Rajdhani',sans-serif;font-size:11px;font-weight:600;color:#dc2626;margin-top:4px;display:none;}
.field-err.show{display:block;}
.field-hint{font-family:'Rajdhani',sans-serif;font-size:10px;color:var(--text-muted);margin-top:3px;letter-spacing:0.3px;}
.uname-status{font-size:11px;font-weight:700;width:16px;height:16px;display:flex;align-items:center;justify-content:center;font-family:'Rajdhani',sans-serif;}
.uname-status.avail{color:#22c55e;}
.uname-status.taken{color:#dc2626;}
.uname-status.checking{color:var(--text-muted);}
.strength-wrap{margin-top:6px;}
.strength-track{height:3px;background:var(--input-border);border-radius:2px;overflow:hidden;margin-bottom:4px;}
.strength-fill{height:100%;border-radius:2px;transition:width .3s ease,background .3s ease;width:0%;}
.strength-label{font-family:'Rajdhani',sans-serif;font-size:10px;font-weight:700;}
.match-hint{font-family:'Rajdhani',sans-serif;font-size:10px;margin-top:4px;display:none;}
.match-hint.show{display:block;}
.match-hint.ok{color:#22c55e;}
.match-hint.fail{color:#dc2626;}
.form-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;}
.check-label{
  display:flex;align-items:center;gap:9px;cursor:pointer;
  font-family:'Rajdhani',sans-serif;font-size:12px;font-weight:600;color:var(--text-secondary);user-select:none;
}
.check-label input{display:none;}
.custom-check{
  width:18px;height:18px;border-radius:2px;border:1.5px solid var(--input-border);background:var(--input-bg);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all var(--transition);
}
.check-label input:checked + .custom-check{background:var(--red);border-color:var(--red);box-shadow:0 0 10px rgba(192,0,26,0.35);}
.check-label input:checked + .custom-check::after{content:'';width:4px;height:8px;border:2px solid white;border-top:none;border-left:none;transform:rotate(45deg) translateY(-1px);}
.terms-row{
  display:flex;align-items:flex-start;gap:9px;margin-bottom:18px;cursor:pointer;
  font-family:'Rajdhani',sans-serif;font-size:12px;font-weight:600;color:var(--text-secondary);user-select:none;
}
.terms-row input{display:none;}
.terms-row input:checked + .custom-check{background:var(--red);border-color:var(--red);box-shadow:0 0 10px rgba(192,0,26,0.35);}
.terms-row input:checked + .custom-check::after{content:'';width:4px;height:8px;border:2px solid white;border-top:none;border-left:none;transform:rotate(45deg) translateY(-1px);}
.terms-row a{color:var(--red);}
.terms-row a:hover{text-decoration:underline;}
.forgot-link{font-family:'Rajdhani',sans-serif;font-size:12px;font-weight:700;color:var(--red);letter-spacing:0.3px;}
.forgot-link:hover{text-decoration:underline;}
.submit-btn{
  width:100%;padding:13px;border:none;border-radius:0;
  background:var(--red);color:#fff;font-family:'Rajdhani',sans-serif;font-size:14px;font-weight:700;letter-spacing:2px;text-transform:uppercase;
  cursor:pointer;transition:all var(--transition);
  display:flex;align-items:center;justify-content:center;gap:9px;
  clip-path:polygon(8px 0%,100% 0%,calc(100% - 8px) 100%,0% 100%);
  box-shadow:0 6px 20px rgba(192,0,26,0.35);margin-bottom:14px;
}
.submit-btn:hover{background:var(--red-dark);box-shadow:0 0 24px var(--red-glow),0 8px 24px rgba(0,0,0,0.4);transform:translateY(-1px);}
.submit-btn:active{transform:translateY(0);}
.submit-btn:disabled{opacity:.6;cursor:not-allowed;transform:none;}
.submit-btn svg{width:16px;height:16px;flex-shrink:0;}
.btn-spinner{
  width:16px;height:16px;border:2.5px solid rgba(255,255,255,.3);
  border-top-color:#fff;border-radius:50%;animation:spin 1s linear infinite;flex-shrink:0;
}
@keyframes spin{to{transform:rotate(360deg)}}
.divider{display:flex;align-items:center;gap:10px;margin:14px 0;}
.divider-line{flex:1;height:1px;background:var(--divider);}
.divider-text{font-family:'Rajdhani',sans-serif;font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--text-muted);}
.card-footer{
  text-align:center;padding-top:14px;border-top:1px solid var(--divider);
  font-family:'Rajdhani',sans-serif;font-size:12px;font-weight:600;color:var(--text-muted);
}
.card-footer a{color:var(--red);font-weight:700;}
.card-footer a:hover{text-decoration:underline;}
.store-badges{
  display:flex;align-items:center;justify-content:center;gap:12px;
  margin-top:12px;flex-wrap:wrap;
}
.s-badge{display:flex;align-items:center;gap:5px;font-family:'Rajdhani',sans-serif;font-size:10px;font-weight:700;letter-spacing:0.5px;color:var(--text-muted);}
.s-dot{width:7px;height:7px;border-radius:50%;}
.sec-badge{display:flex;align-items:center;justify-content:center;gap:6px;margin-bottom:16px;font-family:'Rajdhani',sans-serif;font-size:10px;font-weight:600;letter-spacing:1px;color:var(--text-muted);}
.sec-badge svg{width:12px;height:12px;color:var(--red);}
@media(max-width:480px){.card{padding:28px 20px 22px;}.form-row{flex-direction:column;align-items:flex-start;gap:10px;}}
@media(max-width:768px){body{padding:16px 12px;}.card-wrap{max-width:100%;}}
</style>
</head>
<body>
<div class="page-bg"></div>
<div class="page-overlay"></div>
<div class="noise-overlay" aria-hidden="true"></div>
<div id="cursor-glow" aria-hidden="true"></div>

<button class="theme-btn" id="themeBtn" aria-label="Basculer le thème">◐ MODE</button>

<div class="card-wrap">
  <div class="card" id="mainCard">
    <div class="logo-wrap">
      <div class="logo-icon">C</div>
      <div class="logo-name">COMPARATEUR<span>TN</span></div>
      <div class="logo-sub">Comparateur Gaming Tunisie</div>
    </div>

    <div class="tab-bar" role="tablist">
      <button class="tab active" id="tabLogin" role="tab" aria-selected="true" onclick="switchTab('login')">Connexion</button>
      <button class="tab" id="tabRegister" role="tab" aria-selected="false" onclick="switchTab('register')">Inscription</button>
    </div>

    <div class="alert" id="mainAlert">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      <span id="alertText"></span>
    </div>

    <div id="formLogin">
      <div class="form-group">
        <label class="form-label" for="loginEmail">E-mail ou nom d'utilisateur</label>
        <div class="input-wrap">
          <input class="form-input" id="loginEmail" type="text" placeholder="vous@exemple.com" autocomplete="username" spellcheck="false">
          <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
        </div>
        <div class="field-err" id="loginEmailErr"></div>
      </div>
      <div class="form-group">
        <label class="form-label" for="loginPass">Mot de passe</label>
        <div class="input-wrap">
          <input class="form-input" id="loginPass" type="password" placeholder="••••••••••••" autocomplete="current-password">
          <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          <div class="input-suffix">
            <button class="pw-toggle" id="loginPwToggle" type="button" aria-label="Voir le mot de passe">
              <svg id="loginEye" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
        </div>
        <div class="field-err" id="loginPassErr"></div>
      </div>
      <div class="form-row">
        <label class="check-label">
          <input type="checkbox" id="rememberMe">
          <span class="custom-check"></span>
          Se souvenir de moi
        </label>
        <a href="/forgot-password" class="forgot-link">Mot de passe oublié ?</a>
      </div>
      <button class="submit-btn" id="loginBtn" onclick="handleLogin()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
        Se connecter
      </button>
      <div class="sec-badge">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
        Connexion chiffrée — Session sécurisée
      </div>
    </div>

    <div id="formRegister" style="display:none;">
      <div class="form-group">
        <label class="form-label" for="regEmail">Adresse e-mail</label>
        <div class="input-wrap">
          <input class="form-input" id="regEmail" type="email" placeholder="vous@exemple.com" autocomplete="email" spellcheck="false">
          <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
        </div>
        <div class="field-err" id="regEmailErr"></div>
      </div>
      <div class="form-group">
        <label class="form-label" for="regUsername">Nom d'utilisateur</label>
        <div class="input-wrap">
          <input class="form-input" id="regUsername" type="text" placeholder="mon_pseudo" autocomplete="username" spellcheck="false" maxlength="20">
          <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          <div class="input-suffix"><span class="uname-status" id="unameStatus"></span></div>
        </div>
        <div class="field-err" id="regUsernameErr"></div>
        <div class="field-hint">3–20 caractères · lettres, chiffres et _ uniquement</div>
      </div>
      <div class="form-group">
        <label class="form-label" for="regDisplay">Nom d'affichage <span style="font-weight:400;opacity:.6;">(optionnel)</span></label>
        <div class="input-wrap">
          <input class="form-input" id="regDisplay" type="text" placeholder="Votre Prénom" autocomplete="name" maxlength="50">
          <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label" for="regPass">Mot de passe</label>
        <div class="input-wrap">
          <input class="form-input" id="regPass" type="password" placeholder="••••••••••••" autocomplete="new-password">
          <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          <div class="input-suffix">
            <button class="pw-toggle" id="regPwToggle1" type="button" aria-label="Voir le mot de passe">
              <svg id="regEye1" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
        </div>
        <div class="strength-wrap" id="strengthWrap" style="display:none;">
          <div class="strength-track"><div class="strength-fill" id="strengthFill"></div></div>
          <span class="strength-label" id="strengthLabel"></span>
        </div>
        <div class="field-err" id="regPassErr"></div>
      </div>
      <div class="form-group">
        <label class="form-label" for="regConfirm">Confirmer le mot de passe</label>
        <div class="input-wrap">
          <input class="form-input" id="regConfirm" type="password" placeholder="••••••••••••" autocomplete="new-password">
          <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          <div class="input-suffix">
            <button class="pw-toggle" id="regPwToggle2" type="button" aria-label="Voir le mot de passe">
              <svg id="regEye2" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
        </div>
        <div class="match-hint" id="matchHint"></div>
        <div class="field-err" id="regConfirmErr"></div>
      </div>
      <label class="terms-row">
        <input type="checkbox" id="termsCheck">
        <span class="custom-check"></span>
        <span>J'accepte les <a href="#" onclick="return false;">conditions d'utilisation</a> et la <a href="#" onclick="return false;">politique de confidentialité</a></span>
      </label>
      <button class="submit-btn" id="registerBtn" onclick="handleRegister()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="8.5" cy="7" r="4"/><line x1="20" y1="8" x2="20" y2="14"/><line x1="23" y1="11" x2="17" y2="11"/></svg>
        Créer mon compte
      </button>
      <div class="sec-badge">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
        Compte sécurisé — Données chiffrées
      </div>
    </div>

    <div class="card-footer">
      <a href="/products">← Retour au comparateur</a>
      <div class="store-badges">
        <span class="s-badge"><span class="s-dot" style="background:#e2001a;"></span>Tunisianet</span>
        <span class="s-badge"><span class="s-dot" style="background:#0066cc;"></span>SpaceNet</span>
        <span class="s-badge"><span class="s-dot" style="background:#ff6600;"></span>Skymil</span>
        <span class="s-badge"><span class="s-dot" style="background:#00933b;"></span>Mytek</span>
      </div>
    </div>
  </div>
</div>

<script>
(function(){
'use strict';

var _tab='login';

function initTheme(){
  var btn=document.getElementById('themeBtn');
  function applyTheme(t){
    document.documentElement.setAttribute('data-theme',t);
    localStorage.setItem('theme',t);
    btn.textContent=t==='dark'?'◐ MODE':'☀ MODE';
  }
  applyTheme(localStorage.getItem('theme')||'dark');
  btn.addEventListener('click',function(){
    applyTheme(document.documentElement.getAttribute('data-theme')==='dark'?'light':'dark');
  });
}

function initCursor(){
  var g=document.getElementById('cursor-glow');
  if(!g)return;
  document.addEventListener('mousemove',function(e){g.style.left=e.clientX+'px';g.style.top=e.clientY+'px';});
  document.addEventListener('mouseenter',function(){g.style.opacity='1';});
  document.addEventListener('mouseleave',function(){g.style.opacity='0';});
}

function showAlert(msg,type){
  var el=document.getElementById('mainAlert');
  var icons={
    error:'<circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>',
    success:'<polyline points="20 6 9 17 4 12"/>',
    warning:'<path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/>'
  };
  el.className='alert '+(type||'error')+' visible';
  el.querySelector('svg').innerHTML=icons[type||'error']||icons.error;
  document.getElementById('alertText').textContent=msg;
}
function hideAlert(){document.getElementById('mainAlert').className='alert';}

function fieldErr(id,msg){
  var el=document.getElementById(id);
  if(el){el.textContent=msg;el.className='field-err show';}
}
function clearErr(id){
  var el=document.getElementById(id);
  if(el){el.textContent='';el.className='field-err';}
}
function setInputState(id,state){
  var el=document.getElementById(id);
  if(!el)return;
  el.classList.remove('err','ok');
  if(state)el.classList.add(state);
}

window.switchTab=function(tab){
  _tab=tab;
  hideAlert();
  document.getElementById('formLogin').style.display=tab==='login'?'':'none';
  document.getElementById('formRegister').style.display=tab==='register'?'':'none';
  document.getElementById('tabLogin').className='tab'+(tab==='login'?' active':'');
  document.getElementById('tabRegister').className='tab'+(tab==='register'?' active':'');
  document.getElementById('tabLogin').setAttribute('aria-selected',tab==='login'?'true':'false');
  document.getElementById('tabRegister').setAttribute('aria-selected',tab==='register'?'true':'false');
  var title=document.querySelector('title');
  if(title)title.textContent=(tab==='login'?'Connexion':'Inscription')+' — ComparateurTN';
};

function togglePw(inputId,eyeId){
  var inp=document.getElementById(inputId);
  var icon=document.getElementById(eyeId);
  var show=inp.type==='password';
  inp.type=show?'text':'password';
  icon.innerHTML=show
    ?'<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>'
    :'<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
}

function shakeCard(){
  var c=document.getElementById('mainCard');
  c.classList.remove('shake');
  void c.offsetWidth;
  c.classList.add('shake');
  c.addEventListener('animationend',function(){c.classList.remove('shake');},{once:true});
}

function navigateTo(href){
  document.body.style.opacity='0';
  document.body.style.transition='opacity .3s ease';
  setTimeout(function(){window.location.href=href;},300);
}

function setLoading(btnId,on,defaultHTML){
  var btn=document.getElementById(btnId);
  btn.disabled=on;
  btn.innerHTML=on?'<div class="btn-spinner"></div>Chargement…':defaultHTML;
}

var loginBtnHTML='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>Se connecter';
var regBtnHTML='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="8.5" cy="7" r="4"/><line x1="20" y1="8" x2="20" y2="14"/><line x1="23" y1="11" x2="17" y2="11"/></svg>Créer mon compte';

window.handleLogin=async function(){
  hideAlert();
  clearErr('loginEmailErr');clearErr('loginPassErr');
  setInputState('loginEmail',null);setInputState('loginPass',null);
  var email=document.getElementById('loginEmail').value.trim();
  var pass=document.getElementById('loginPass').value;
  var ok=true;
  if(!email){fieldErr('loginEmailErr','Ce champ est requis');setInputState('loginEmail','err');ok=false;}
  if(!pass){fieldErr('loginPassErr','Ce champ est requis');setInputState('loginPass','err');ok=false;}
  if(!ok){shakeCard();return;}
  setLoading('loginBtn',true,loginBtnHTML);
  try{
    var res=await fetch('/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email:email,password:pass})});
    var data=await res.json();
    if(res.ok&&data.success){
      showAlert('Connexion réussie. Redirection…','success');
      var redirect=new URLSearchParams(window.location.search).get('redirect')||'/products';
      setTimeout(function(){navigateTo(redirect);},600);
    }else{
      setLoading('loginBtn',false,loginBtnHTML);
      shakeCard();
      var type=res.status===423?'warning':'error';
      showAlert(data.error||'Identifiants incorrects.',type);
      document.getElementById('loginPass').value='';
      document.getElementById('loginPass').focus();
    }
  }catch(e){
    setLoading('loginBtn',false,loginBtnHTML);
    shakeCard();
    showAlert('Erreur de connexion. Vérifiez votre réseau.','error');
  }
};

function getStrength(pw){
  var s=0;
  if(pw.length>=8)s++;if(pw.length>=12)s++;
  if(/[A-Z]/.test(pw))s++;if(/[a-z]/.test(pw))s++;
  if(/[0-9]/.test(pw))s++;if(/[^A-Za-z0-9]/.test(pw))s++;
  if(s<=2)return{w:25,label:'Faible',color:'#dc2626'};
  if(s<=3)return{w:50,label:'Correct',color:'#d97706'};
  if(s<=4)return{w:75,label:'Fort',color:'#2563eb'};
  return{w:100,label:'Très fort',color:'#16a34a'};
}



window.handleRegister=async function(){
  hideAlert();
  ['regEmail','regUsername','regPass','regConfirm'].forEach(function(id){clearErr(id+'Err');setInputState(id,null);});
  var email=document.getElementById('regEmail').value.trim();
  var username=document.getElementById('regUsername').value.trim();
  var display=document.getElementById('regDisplay').value.trim();
  var pass=document.getElementById('regPass').value;
  var confirm=document.getElementById('regConfirm').value;
  var terms=document.getElementById('termsCheck').checked;
  var ok=true;
  if(!email||!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)){fieldErr('regEmailErr','Adresse e-mail invalide');setInputState('regEmail','err');ok=false;}
  if(!username||username.length<3){fieldErr('regUsernameErr','Min 3 caractères');setInputState('regUsername','err');ok=false;}
  else if(!/^[a-zA-Z0-9_]+$/.test(username)){fieldErr('regUsernameErr','Lettres, chiffres et _ uniquement');setInputState('regUsername','err');ok=false;}
  if(!pass||pass.length<8){fieldErr('regPassErr','Min 8 caractères');setInputState('regPass','err');ok=false;}
  else if(!/(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[^A-Za-z0-9])/.test(pass)){fieldErr('regPassErr','Doit contenir majuscule, minuscule, chiffre et symbole');setInputState('regPass','err');ok=false;}
  if(pass!==confirm){fieldErr('regConfirmErr','Les mots de passe ne correspondent pas');setInputState('regConfirm','err');ok=false;}
  if(!terms){showAlert('Vous devez accepter les conditions d\'utilisation','error');ok=false;}
  if(!ok){shakeCard();return;}
  setLoading('registerBtn',true,regBtnHTML);
  try{
    var res=await fetch('/auth/register',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email:email,username:username,displayName:display,password:pass,confirmPassword:confirm,terms:'true'})});
    var data=await res.json();
    if(res.ok&&data.success){
      showAlert('Compte créé ! Vérifiez votre e-mail pour activer votre compte.','success');
      setTimeout(function(){navigateTo('/verify-email?email='+encodeURIComponent(email));},2000);
    }else{
      setLoading('registerBtn',false,regBtnHTML);
      shakeCard();
      showAlert(data.error||'Erreur lors de la création du compte.','error');
    }
  }catch(e){
    setLoading('registerBtn',false,regBtnHTML);
    shakeCard();
    showAlert('Erreur de connexion. Vérifiez votre réseau.','error');
  }
};

document.addEventListener('keydown',function(e){
  if(e.key==='Enter'){
    if(_tab==='login')handleLogin();
    else if(_tab==='register')handleRegister();
  }
});

async function checkAuth(){
  try{
    var res=await fetch('/auth/me');
    if(res.ok){
      var data=await res.json();
      if(data&&data.user){
        var redirect=new URLSearchParams(window.location.search).get('redirect')||'/products';
        window.location.href=redirect;
      }
    }
  }catch(e){}
}

function checkMatch(){
  var pw=document.getElementById('regPass').value;
  var cpw=document.getElementById('regConfirm').value;
  var hint=document.getElementById('matchHint');
  if(!cpw){hint.className='match-hint';return;}
  if(pw===cpw){hint.className='match-hint ok show';hint.textContent='✓ Les mots de passe correspondent';setInputState('regConfirm','ok');}
  else{hint.className='match-hint fail show';hint.textContent='✗ Ne correspondent pas';setInputState('regConfirm','err');}
}

function initListeners(){
  var unameTimer=null;
  var regPassEl=document.getElementById('regPass');
  if(regPassEl){
    regPassEl.addEventListener('input',function(e){
      var pw=e.target.value;
      var wrap=document.getElementById('strengthWrap');
      var fill=document.getElementById('strengthFill');
      var lbl=document.getElementById('strengthLabel');
      if(pw){wrap.style.display='block';var s=getStrength(pw);fill.style.width=s.w+'%';fill.style.background=s.color;lbl.textContent=s.label;lbl.style.color=s.color;}
      else{wrap.style.display='none';}
      clearErr('regPassErr');setInputState('regPass',null);
      checkMatch();
    });
  }
  var regConfirmEl=document.getElementById('regConfirm');
  if(regConfirmEl)regConfirmEl.addEventListener('input',function(){clearErr('regConfirmErr');setInputState('regConfirm',null);checkMatch();});
  var regUsernameEl=document.getElementById('regUsername');
  if(regUsernameEl){
    regUsernameEl.addEventListener('input',function(e){
      var val=e.target.value.trim();
      var status=document.getElementById('unameStatus');
      clearErr('regUsernameErr');setInputState('regUsername',null);
      status.textContent='';
      clearTimeout(unameTimer);
      if(!val||val.length<3)return;
      if(!/^[a-zA-Z0-9_]+$/.test(val))return;
      status.className='uname-status checking';status.textContent='…';
      unameTimer=setTimeout(async function(){
        try{
          var res=await fetch('/auth/check-username/'+encodeURIComponent(val));
          var data=await res.json();
          if(data.available){status.className='uname-status avail';status.textContent='✓';setInputState('regUsername','ok');}
          else{status.className='uname-status taken';status.textContent='✗';fieldErr('regUsernameErr',"Nom d'utilisateur déjà pris");setInputState('regUsername','err');}
        }catch(e){status.textContent='';}
      },400);
    });
  }
  ['regEmail','regDisplay'].forEach(function(id){
    var el=document.getElementById(id);
    if(el)el.addEventListener('input',function(){clearErr(id+'Err');setInputState(id,null);hideAlert();});
  });
  ['loginEmail','loginPass'].forEach(function(id){
    var el=document.getElementById(id);
    if(el)el.addEventListener('input',function(){clearErr(id==='loginEmail'?'loginEmailErr':'loginPassErr');setInputState(id,null);hideAlert();});
  });
  var loginPwToggle=document.getElementById('loginPwToggle');
  if(loginPwToggle)loginPwToggle.addEventListener('click',function(){togglePw('loginPass','loginEye');});
  var regPwToggle1=document.getElementById('regPwToggle1');
  if(regPwToggle1)regPwToggle1.addEventListener('click',function(){togglePw('regPass','regEye1');});
  var regPwToggle2=document.getElementById('regPwToggle2');
  if(regPwToggle2)regPwToggle2.addEventListener('click',function(){togglePw('regConfirm','regEye2');});
}

function init(){
  initTheme();
  initCursor();
  initListeners();
  var tab=new URLSearchParams(window.location.search).get('tab');
  if(tab==='register'||window.location.pathname.includes('register'))switchTab('register');
  checkAuth();
  window.addEventListener('load',function(){document.body.style.opacity='1';});
}

if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',init);
else init();
})();
</script>
</body>
</html>
