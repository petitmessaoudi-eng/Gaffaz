<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mot de passe oublié — ComparateurTN</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --emerald:#059669; --emerald-light:#34d399; --gold:#d4a574; --coral:#e07a5f;
  --glass-bg:rgba(255,255,255,0.05); --glass-border:rgba(255,255,255,0.1);
  --glass-hover:rgba(255,255,255,0.08);
  --bg-dark:#0a0f0d; --bg-gradient-1:#0d1a14; --bg-gradient-2:#132419; --bg-gradient-3:#1a2e23;
  --text-primary:#f5f5f4; --text-secondary:rgba(245,245,244,0.7); --text-muted:rgba(245,245,244,0.4);
  --danger:#dc2626; --transition-fast:0.2s ease;
}
[data-theme="light"] {
  --glass-bg:rgba(255,255,255,0.6); --glass-border:rgba(0,0,0,0.1); --glass-hover:rgba(255,255,255,0.8);
  --bg-dark:#f5f5f0; --bg-gradient-1:#e8f5e9; --bg-gradient-2:#f1f8e9; --bg-gradient-3:#fefefe;
  --text-primary:#1a1a1a; --text-secondary:rgba(26,26,26,0.7); --text-muted:rgba(26,26,26,0.5);
}
[data-theme="light"] .orb { opacity:.15; }
*,*::before,*::after { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family:'Outfit',sans-serif; background:var(--bg-dark); color:var(--text-primary);
  min-height:100vh; display:flex; align-items:center; justify-content:center;
  opacity:0; transition:opacity .3s ease; padding:20px;
}
a { text-decoration:none; color:inherit; }
.background {
  position:fixed; inset:0; z-index:-2;
  background:linear-gradient(135deg,var(--bg-gradient-1) 0%,var(--bg-gradient-2) 50%,var(--bg-gradient-3) 100%);
}
.background::before {
  content:''; position:absolute; inset:0;
  background:radial-gradient(ellipse 80% 50% at 20% 40%,rgba(120,0,255,.18) 0%,transparent 50%),
    radial-gradient(ellipse 60% 40% at 80% 60%,rgba(0,200,255,.14) 0%,transparent 50%);
}
.orb { position:fixed; border-radius:50%; filter:blur(80px); opacity:.4; z-index:-1; animation:float 20s ease-in-out infinite; }
.orb-1 { width:500px; height:500px; background:var(--emerald); top:-10%; left:-10%; }
.orb-2 { width:400px; height:400px; background:var(--gold); bottom:-10%; right:-5%; animation-delay:-6s; }
@keyframes float { 0%,100%{transform:translate(0,0)} 50%{transform:translate(-20px,20px)} }
.theme-toggle-fixed {
  position:fixed; top:20px; right:20px; z-index:200;
  width:44px; height:44px; background:var(--glass-bg); backdrop-filter:blur(10px);
  border:1px solid var(--glass-border); border-radius:12px;
  display:flex; align-items:center; justify-content:center;
  cursor:pointer; transition:all var(--transition-fast); color:var(--text-secondary);
}
.theme-toggle-fixed:hover { background:var(--glass-hover); border-color:var(--emerald-light); }
.theme-toggle-fixed svg { width:18px; height:18px; }
.wrapper { width:100%; max-width:440px; animation:fadeInUp .7s ease-out; }
@keyframes fadeInUp { from{opacity:0;transform:translateY(32px)} to{opacity:1;transform:translateY(0)} }
.card {
  background:var(--glass-bg); backdrop-filter:blur(24px); -webkit-backdrop-filter:blur(24px);
  border:1px solid var(--glass-border); border-radius:28px; padding:48px 44px;
  position:relative; overflow:hidden;
  box-shadow:0 32px 80px rgba(0,0,0,.35),0 0 0 1px rgba(255,255,255,.05) inset;
}
.card::before {
  content:''; position:absolute; top:0; left:0; right:0; height:1px;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.25),transparent);
}
.logo-wrap { text-align:center; margin-bottom:32px; }
.logo-icon {
  width:64px; height:64px; background:linear-gradient(135deg,var(--emerald),var(--gold));
  border-radius:20px; display:flex; align-items:center; justify-content:center;
  font-weight:700; font-size:28px; box-shadow:0 12px 40px rgba(5,150,105,.4);
  margin:0 auto 14px;
}
.logo-name {
  font-size:22px; font-weight:700;
  background:linear-gradient(135deg,var(--emerald-light),var(--gold));
  -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
}
.logo-tagline { font-size:13px; color:var(--text-muted); margin-top:4px; }
.alert {
  display:flex; align-items:flex-start; gap:12px; padding:13px 16px;
  border-radius:12px; margin-bottom:20px; font-size:13px;
  opacity:0; transform:translateY(-8px); transition:all .25s ease; pointer-events:none;
}
.alert.visible { opacity:1; transform:translateY(0); pointer-events:all; }
.alert.error { background:rgba(220,38,38,.1); border:1px solid rgba(220,38,38,.25); color:#fca5a5; }
.alert.success { background:rgba(34,197,94,.1); border:1px solid rgba(34,197,94,.25); color:#86efac; }
.alert svg { width:18px; height:18px; flex-shrink:0; margin-top:1px; }
.form-label { display:block; font-size:13px; font-weight:600; color:var(--text-secondary); margin-bottom:8px; }
.form-input-wrap { position:relative; margin-bottom:8px; }
.form-input-icon {
  position:absolute; left:16px; top:50%; transform:translateY(-50%);
  width:18px; height:18px; color:var(--text-muted); pointer-events:none;
}
.form-input-wrap:focus-within .form-input-icon { color:var(--emerald-light); }
.form-input {
  width:100%; padding:14px 16px 14px 48px;
  background:var(--glass-bg); border:1.5px solid var(--glass-border); border-radius:14px;
  color:var(--text-primary); font-family:inherit; font-size:15px;
  transition:all var(--transition-fast); outline:none;
}
.form-input::placeholder { color:var(--text-muted); }
.form-input:focus {
  border-color:var(--emerald-light); background:var(--glass-hover);
  box-shadow:0 0 0 3px rgba(52,211,153,.12);
}
.form-input.error { border-color:var(--danger); box-shadow:0 0 0 3px rgba(220,38,38,.12); }
.field-error { font-size:12px; color:var(--danger); margin-bottom:16px; display:none; }
.field-error.visible { display:block; }
.submit-btn {
  width:100%; padding:14px;
  background:linear-gradient(135deg,var(--emerald),var(--emerald-light));
  border:none; border-radius:14px; color:white; font-family:inherit; font-size:15px; font-weight:700;
  cursor:pointer; transition:all var(--transition-fast);
  display:flex; align-items:center; justify-content:center; gap:10px;
  box-shadow:0 8px 32px rgba(5,150,105,.35); letter-spacing:.3px; margin-bottom:20px;
}
.submit-btn:hover { transform:translateY(-2px); box-shadow:0 14px 40px rgba(5,150,105,.5); }
.submit-btn:disabled { opacity:.65; cursor:not-allowed; transform:none; }
.submit-btn svg { width:17px; height:17px; }
.btn-spinner {
  width:18px; height:18px; border:2.5px solid rgba(255,255,255,.35);
  border-top-color:white; border-radius:50%; animation:spin 1s linear infinite;
}
@keyframes spin { to{transform:rotate(360deg)} }
.back-link { text-align:center; font-size:13px; color:var(--text-muted); }
.back-link a { color:var(--emerald-light); font-weight:500; }
.back-link a:hover { color:var(--gold); }
@media(max-width:480px){ .card { padding:36px 24px; border-radius:20px; } }
</style>
</head>
<body>
<div class="background"></div>
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>

<button class="theme-toggle-fixed" id="themeToggle">
  <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
  <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
</button>

<div class="wrapper">
  <div class="card">
    <div class="logo-wrap">
      <div class="logo-icon">C</div>
      <div class="logo-name">ComparateurTN</div>
      <div class="logo-tagline">Réinitialiser votre mot de passe</div>
    </div>

    <div class="alert" id="mainAlert">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      <span id="mainAlertText"></span>
    </div>

    <div id="formSection">
      <label class="form-label" for="emailInput">Adresse e-mail</label>
      <div class="form-input-wrap">
        <input class="form-input" id="emailInput" type="email" placeholder="vous@exemple.com" autocomplete="email">
        <svg class="form-input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
      </div>
      <div class="field-error" id="emailError">Adresse e-mail invalide</div>

      <button class="submit-btn" id="submitBtn" onclick="handleSubmit()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12"/><path d="M22 22l-4-4"/><path d="M15 15l4 4"/></svg>
        Envoyer le lien
      </button>

      <div class="back-link">
        <a href="/login">← Retour à la connexion</a>
      </div>
    </div>

  </div>
</div>

<script>
(function(){
'use strict';
function initTheme(){
  const toggle = document.getElementById('themeToggle');
  const sun = toggle.querySelector('.icon-sun');
  const moon = toggle.querySelector('.icon-moon');
  function setTheme(t){
    document.documentElement.setAttribute('data-theme', t);
    localStorage.setItem('theme', t);
    sun.style.display = t === 'light' ? 'none' : 'block';
    moon.style.display = t === 'light' ? 'block' : 'none';
  }
  setTheme(localStorage.getItem('theme') || 'dark');
  toggle.addEventListener('click', () => setTheme(document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark'));
}

function showAlert(msg, type){
  const el = document.getElementById('mainAlert');
  el.className = 'alert ' + type + ' visible';
  el.querySelector('svg').innerHTML = type === 'success'
    ? '<polyline points="20 6 9 17 4 12"/>'
    : '<circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>';
  document.getElementById('mainAlertText').textContent = msg;
}

window.handleSubmit = async function(){
  const emailEl = document.getElementById('emailInput');
  const emailErrEl = document.getElementById('emailError');
  const btn = document.getElementById('submitBtn');
  const email = emailEl.value.trim();

  emailEl.classList.remove('error');
  emailErrEl.classList.remove('visible');

  if(!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)){
    emailEl.classList.add('error');
    emailErrEl.classList.add('visible');
    return;
  }

  btn.disabled = true;
  btn.innerHTML = '<div class="btn-spinner"></div>Envoi en cours…';

  try {
    const res = await fetch('/auth/forgot-password', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email })
    });
    const data = await res.json();
    document.getElementById('formSection').style.display = 'none';
    showAlert(data.message || 'Si ce compte existe, un lien a été envoyé à votre adresse e-mail.', 'success');
  } catch(e){
    btn.disabled = false;
    btn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12"/></svg>Envoyer le lien';
    showAlert('Erreur de connexion. Réessayez.', 'error');
  }
};

document.getElementById('emailInput').addEventListener('keydown', e => { if(e.key === 'Enter') handleSubmit(); });
initTheme();
window.addEventListener('load', () => { document.body.style.opacity = '1'; });
})();
</script>
</body>
</html>
