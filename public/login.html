<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Administration — ComparateurTN</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;600;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --red:#C0001A;--red-dark:#8B0000;--red-glow:rgba(192,0,26,0.4);--red-subtle:rgba(192,0,26,0.1);--red-border:rgba(192,0,26,0.3);
  --radius:4px;--transition:0.2s ease;--transition-slow:0.3s ease;
}
[data-theme="dark"]{
  --bg-overlay:rgba(5,5,5,0.82);--card-bg:rgba(12,12,12,0.9);--card-border:rgba(255,255,255,0.07);
  --input-bg:rgba(255,255,255,0.05);--input-border:rgba(255,255,255,0.12);
  --text-primary:#f5f5f5;--text-secondary:rgba(245,245,245,0.65);--text-muted:rgba(245,245,245,0.38);
  --divider:rgba(255,255,255,0.07);--navbar-bg:rgba(5,5,5,0.95);--pill-bg:rgba(255,255,255,0.06);--pill-border:rgba(255,255,255,0.1);
}
[data-theme="light"]{
  --bg-overlay:rgba(255,255,255,0.85);--card-bg:rgba(255,255,255,0.94);--card-border:rgba(0,0,0,0.09);
  --input-bg:rgba(0,0,0,0.04);--input-border:rgba(0,0,0,0.14);
  --text-primary:#111111;--text-secondary:rgba(17,17,17,0.7);--text-muted:rgba(17,17,17,0.45);
  --divider:rgba(0,0,0,0.08);--navbar-bg:rgba(255,255,255,0.96);--pill-bg:rgba(0,0,0,0.04);--pill-border:rgba(0,0,0,0.1);
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;overflow-x:hidden;}
body{
  font-family:'Outfit',sans-serif;color:var(--text-primary);
  min-height:100vh;overflow-y:auto;overflow-x:hidden;
  display:flex;align-items:center;justify-content:center;
  opacity:0;transition:opacity .3s ease;padding:24px 16px;
}
a{text-decoration:none;color:inherit;}
::-webkit-scrollbar{width:5px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--red-border);border-radius:3px;}
.page-bg{
  position:fixed;inset:0;z-index:-2;
  background-size:cover;background-position:center top;background-repeat:no-repeat;
}
[data-theme="dark"] .page-bg{background-image:url('dark.jpg');}
[data-theme="light"] .page-bg{background-image:url('light.jpg');}
.page-overlay{
  position:fixed;inset:0;z-index:-1;
  background:var(--bg-overlay);backdrop-filter:blur(3px);-webkit-backdrop-filter:blur(3px);
  transition:background var(--transition-slow);
}
.noise-overlay{
  position:fixed;inset:0;z-index:9998;pointer-events:none;opacity:0.03;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
  background-repeat:repeat;background-size:200px 200px;
}
#cursor-glow{
  position:fixed;width:280px;height:280px;border-radius:50%;
  background:radial-gradient(circle,rgba(192,0,26,0.08) 0%,transparent 70%);
  pointer-events:none;z-index:9997;transform:translate(-50%,-50%);transition:opacity .3s;
}
.theme-btn{
  position:fixed;top:18px;right:18px;z-index:300;
  background:var(--card-bg);backdrop-filter:blur(12px);border:1px solid var(--card-border);
  border-radius:var(--radius);color:var(--text-secondary);cursor:pointer;
  padding:7px 14px;font-family:'Rajdhani',sans-serif;font-size:0.75rem;font-weight:700;letter-spacing:1px;
  transition:all var(--transition);
}
.theme-btn:hover{border-color:var(--red);color:var(--red);}
.card-wrap{width:100%;max-width:460px;animation:fadeUp .65s ease-out;}
@keyframes fadeUp{from{opacity:0;transform:translateY(28px)}to{opacity:1;transform:translateY(0)}}
.card{
  background:var(--card-bg);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border:1px solid var(--card-border);border-radius:var(--radius);
  padding:40px 36px 28px;position:relative;overflow:hidden;
  box-shadow:0 24px 60px rgba(0,0,0,0.5),0 0 0 1px rgba(255,255,255,0.04) inset;
}
.card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,var(--red),transparent);
}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-7px)}40%{transform:translateX(7px)}60%{transform:translateX(-4px)}80%{transform:translateX(4px)}}
.shake{animation:shake .4s ease;}
.logo-wrap{text-align:center;margin-bottom:28px;}
.logo-icon{
  width:60px;height:60px;border-radius:var(--radius);
  background:linear-gradient(135deg,#059669,#d4a574);
  display:flex;align-items:center;justify-content:center;
  font-family:'Bebas Neue',sans-serif;font-size:30px;color:#fff;
  margin:0 auto 12px;box-shadow:0 8px 28px rgba(5,150,105,0.4);
}
.logo-name{
  font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:3px;
  color:var(--text-primary);position:relative;display:inline-block;padding-bottom:3px;
}
.logo-name::after{
  content:'';position:absolute;bottom:0;left:0;width:100%;height:1.5px;
  background:linear-gradient(90deg,var(--red),transparent);box-shadow:0 0 6px var(--red-glow);
}
.logo-name span{color:var(--red);}
.logo-sub{font-family:'Rajdhani',sans-serif;font-size:11px;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;color:var(--text-muted);margin-top:4px;}
.divider{display:flex;align-items:center;gap:10px;margin-bottom:24px;}
.divider-line{flex:1;height:1px;background:var(--divider);}
.divider-text{font-family:'Rajdhani',sans-serif;font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--text-muted);}
.alert{
  display:flex;align-items:flex-start;gap:10px;padding:11px 14px;
  border-radius:var(--radius);margin-bottom:16px;font-size:13px;font-family:'Rajdhani',sans-serif;font-weight:600;
  opacity:0;transform:translateY(-6px);transition:all .22s ease;pointer-events:none;
}
.alert.visible{opacity:1;transform:translateY(0);pointer-events:all;}
.alert.error{background:rgba(220,38,38,.1);border:1px solid rgba(220,38,38,.25);color:#fca5a5;}
.alert.success{background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.25);color:#86efac;}
.alert svg{width:16px;height:16px;flex-shrink:0;margin-top:1px;}
.form-group{margin-bottom:16px;}
.form-label{
  display:block;font-family:'Rajdhani',sans-serif;font-size:11px;font-weight:700;
  letter-spacing:1.5px;text-transform:uppercase;color:var(--text-secondary);margin-bottom:6px;
}
.input-wrap{position:relative;}
.input-icon{
  position:absolute;left:13px;top:50%;transform:translateY(-50%);
  width:16px;height:16px;color:var(--text-muted);pointer-events:none;transition:color var(--transition);
}
.input-wrap:focus-within .input-icon{color:var(--red);}
.form-input{
  width:100%;padding:13px 44px 13px 40px;
  background:var(--input-bg);border:1.5px solid var(--input-border);border-radius:var(--radius);
  color:var(--text-primary);font-family:'Outfit',sans-serif;font-size:14px;
  transition:all var(--transition);outline:none;
}
.form-input::placeholder{color:var(--text-muted);}
.form-input:focus{border-color:var(--red);background:rgba(192,0,26,0.04);box-shadow:0 0 0 3px rgba(192,0,26,0.12);}
.form-input.err{border-color:#dc2626;box-shadow:0 0 0 3px rgba(220,38,38,0.1);}
.input-suffix{position:absolute;right:10px;top:50%;transform:translateY(-50%);}
.pw-toggle{
  width:28px;height:28px;border:none;background:transparent;cursor:pointer;
  color:var(--text-muted);display:flex;align-items:center;justify-content:center;
  border-radius:2px;transition:all var(--transition);
}
.pw-toggle:hover{color:var(--text-primary);background:var(--pill-bg);}
.pw-toggle svg{width:15px;height:15px;}
.field-err{font-family:'Rajdhani',sans-serif;font-size:11px;font-weight:600;color:#dc2626;margin-top:4px;display:none;}
.field-err.show{display:block;}
.form-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:22px;}
.check-label{
  display:flex;align-items:center;gap:9px;cursor:pointer;
  font-family:'Rajdhani',sans-serif;font-size:12px;font-weight:600;color:var(--text-secondary);user-select:none;
}
.check-label input{display:none;}
.custom-check{
  width:18px;height:18px;border-radius:2px;border:1.5px solid var(--input-border);background:var(--input-bg);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all var(--transition);
}
.check-label input:checked + .custom-check{background:var(--red);border-color:var(--red);box-shadow:0 0 10px rgba(192,0,26,0.35);}
.check-label input:checked + .custom-check::after{content:'';width:4px;height:8px;border:2px solid white;border-top:none;border-left:none;transform:rotate(45deg) translateY(-1px);}
.forgot-link{font-family:'Rajdhani',sans-serif;font-size:12px;font-weight:700;color:var(--red);letter-spacing:0.3px;cursor:pointer;}
.forgot-link:hover{text-decoration:underline;}
.submit-btn{
  width:100%;padding:13px;border:none;border-radius:0;
  background:var(--red);color:#fff;font-family:'Rajdhani',sans-serif;font-size:14px;font-weight:700;letter-spacing:2px;text-transform:uppercase;
  cursor:pointer;transition:all var(--transition);
  display:flex;align-items:center;justify-content:center;gap:9px;
  clip-path:polygon(8px 0%,100% 0%,calc(100% - 8px) 100%,0% 100%);
  box-shadow:0 6px 20px rgba(192,0,26,0.35);margin-bottom:16px;
}
.submit-btn:hover{background:var(--red-dark);box-shadow:0 0 24px var(--red-glow),0 8px 24px rgba(0,0,0,0.4);transform:translateY(-1px);}
.submit-btn:active{transform:translateY(0);}
.submit-btn:disabled{opacity:.6;cursor:not-allowed;transform:none;}
.submit-btn svg{width:16px;height:16px;flex-shrink:0;}
.btn-spinner{
  width:16px;height:16px;border:2.5px solid rgba(255,255,255,.3);
  border-top-color:#fff;border-radius:50%;animation:spin 1s linear infinite;flex-shrink:0;
}
@keyframes spin{to{transform:rotate(360deg)}}
.sec-badge{display:flex;align-items:center;justify-content:center;gap:6px;margin-bottom:18px;font-family:'Rajdhani',sans-serif;font-size:10px;font-weight:600;letter-spacing:1px;color:var(--text-muted);}
.sec-badge svg{width:12px;height:12px;color:var(--red);}
.card-footer{
  text-align:center;padding-top:16px;border-top:1px solid var(--divider);
  font-family:'Rajdhani',sans-serif;font-size:11px;font-weight:600;color:var(--text-muted);
}
.card-footer a{color:var(--red);font-weight:700;}
.card-footer a:hover{text-decoration:underline;}
.store-badges{
  display:flex;align-items:center;justify-content:center;gap:12px;
  margin-top:12px;flex-wrap:wrap;
}
.s-badge{display:flex;align-items:center;gap:5px;font-family:'Rajdhani',sans-serif;font-size:10px;font-weight:700;letter-spacing:0.5px;color:var(--text-muted);}
.s-dot{width:7px;height:7px;border-radius:50%;}
@media(max-width:480px){.card{padding:28px 20px 22px;}}
</style>
</head>
<body>
<div class="page-bg"></div>
<div class="page-overlay"></div>
<div class="noise-overlay" aria-hidden="true"></div>
<div id="cursor-glow" aria-hidden="true"></div>

<button class="theme-btn" id="themeBtn" aria-label="Basculer le thème">◐ MODE</button>

<div class="card-wrap">
  <div class="card" id="loginCard">
    <div class="logo-wrap">
      <div class="logo-icon">C</div>
      <div class="logo-name">COMPARATEUR<span>TN</span></div>
      <div class="logo-sub">Panneau d'administration</div>
    </div>

    <div class="divider">
      <div class="divider-line"></div>
      <span class="divider-text">Connexion sécurisée</span>
      <div class="divider-line"></div>
    </div>

    <div class="alert" id="loginAlert">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      <span id="loginAlertText"></span>
    </div>

    <div class="form-group">
      <label class="form-label" for="emailInput">Adresse e-mail</label>
      <div class="input-wrap">
        <input class="form-input" id="emailInput" type="email" placeholder="admin@comparateurtn.com" autocomplete="email" spellcheck="false">
        <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
      </div>
      <div class="field-err" id="emailErr"></div>
    </div>

    <div class="form-group">
      <label class="form-label" for="passwordInput">Mot de passe</label>
      <div class="input-wrap">
        <input class="form-input" id="passwordInput" type="password" placeholder="••••••••••••" autocomplete="current-password">
        <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        <div class="input-suffix">
          <button class="pw-toggle" id="pwToggle" type="button" aria-label="Voir le mot de passe">
            <svg id="eyeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
      </div>
      <div class="field-err" id="passErr"></div>
    </div>

    <div class="form-row">
      <label class="check-label">
        <input type="checkbox" id="rememberMe">
        <span class="custom-check"></span>
        Se souvenir de moi
      </label>
      <span class="forgot-link" onclick="showForgotMsg()">Mot de passe oublié ?</span>
    </div>

    <button class="submit-btn" id="loginBtn" onclick="handleLogin()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
      Se connecter
    </button>

    <div class="sec-badge">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
      Connexion chiffrée — Session sécurisée
    </div>

    <div class="card-footer">
      <a href="/products">← Retour au comparateur</a>
      <div class="store-badges">
        <span class="s-badge"><span class="s-dot" style="background:#e2001a;"></span>Tunisianet</span>
        <span class="s-badge"><span class="s-dot" style="background:#0066cc;"></span>SpaceNet</span>
        <span class="s-badge"><span class="s-dot" style="background:#ff6600;"></span>Skymil</span>
        <span class="s-badge"><span class="s-dot" style="background:#00933b;"></span>Mytek</span>
      </div>
    </div>
  </div>
</div>

<script>
(function(){
'use strict';

var loginBtnHTML='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>Se connecter';

function initTheme(){
  var btn=document.getElementById('themeBtn');
  function applyTheme(t){
    document.documentElement.setAttribute('data-theme',t);
    localStorage.setItem('theme',t);
    btn.textContent=t==='dark'?'◐ MODE':'☀ MODE';
  }
  applyTheme(localStorage.getItem('theme')||'dark');
  btn.addEventListener('click',function(){
    applyTheme(document.documentElement.getAttribute('data-theme')==='dark'?'light':'dark');
  });
}

function initCursor(){
  var g=document.getElementById('cursor-glow');
  if(!g)return;
  document.addEventListener('mousemove',function(e){g.style.left=e.clientX+'px';g.style.top=e.clientY+'px';});
}

function showAlert(msg,type){
  var el=document.getElementById('loginAlert');
  el.className='alert '+(type||'error')+' visible';
  var icons={
    error:'<circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>',
    success:'<polyline points="20 6 9 17 4 12"/>'
  };
  el.querySelector('svg').innerHTML=icons[type||'error']||icons.error;
  document.getElementById('loginAlertText').textContent=msg;
}
function hideAlert(){document.getElementById('loginAlert').className='alert';}

function fieldErr(id,msg){
  var el=document.getElementById(id);
  if(el){el.textContent=msg;el.className='field-err show';}
}
function clearErr(id){
  var el=document.getElementById(id);
  if(el){el.textContent='';el.className='field-err';}
}
function setInputErr(id,on){
  var el=document.getElementById(id);
  if(el){el.classList.toggle('err',on);}
}

function shakeCard(){
  var c=document.getElementById('loginCard');
  c.classList.remove('shake');
  void c.offsetWidth;
  c.classList.add('shake');
  c.addEventListener('animationend',function(){c.classList.remove('shake');},{once:true});
}

document.getElementById('pwToggle').addEventListener('click',function(){
  var inp=document.getElementById('passwordInput');
  var icon=document.getElementById('eyeIcon');
  var show=inp.type==='password';
  inp.type=show?'text':'password';
  icon.innerHTML=show
    ?'<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>'
    :'<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
});

document.getElementById('emailInput').addEventListener('input',function(){clearErr('emailErr');setInputErr('emailInput',false);hideAlert();});
document.getElementById('passwordInput').addEventListener('input',function(){clearErr('passErr');setInputErr('passwordInput',false);hideAlert();});

window.handleLogin=async function(){
  hideAlert();
  clearErr('emailErr');clearErr('passErr');
  setInputErr('emailInput',false);setInputErr('passwordInput',false);
  var email=document.getElementById('emailInput').value.trim();
  var password=document.getElementById('passwordInput').value;
  var ok=true;
  if(!email){fieldErr('emailErr','L\'adresse e-mail est requise');setInputErr('emailInput',true);ok=false;}
  else if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)){fieldErr('emailErr','Adresse e-mail invalide');setInputErr('emailInput',true);ok=false;}
  if(!password){fieldErr('passErr','Le mot de passe est requis');setInputErr('passwordInput',true);ok=false;}
  else if(password.length<6){fieldErr('passErr','Mot de passe trop court');setInputErr('passwordInput',true);ok=false;}
  if(!ok)return;
  var btn=document.getElementById('loginBtn');
  btn.disabled=true;
  btn.innerHTML='<div class="btn-spinner"></div>Connexion en cours…';
  try{
    var res=await fetch('/admin/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email:email,password:password})});
    var data=await res.json();
    if(res.ok&&data.success){
      showAlert('Connexion réussie. Redirection…','success');
      setTimeout(function(){
        document.body.style.opacity='0';
        document.body.style.transition='opacity .3s ease';
        setTimeout(function(){window.location.href='/admin';},300);
      },600);
    }else{
      btn.disabled=false;btn.innerHTML=loginBtnHTML;
      shakeCard();
      showAlert(data.error||'Identifiants incorrects. Veuillez réessayer.','error');
      document.getElementById('passwordInput').value='';
      document.getElementById('passwordInput').focus();
    }
  }catch(e){
    btn.disabled=false;btn.innerHTML=loginBtnHTML;
    shakeCard();
    showAlert('Erreur de connexion. Vérifiez votre réseau.','error');
  }
};

window.showForgotMsg=function(){
  showAlert('Contactez l\'administrateur système pour réinitialiser votre mot de passe.','error');
};

document.addEventListener('keydown',function(e){if(e.key==='Enter')handleLogin();});

async function checkAuth(){
  try{
    var res=await fetch('/admin/api/auth-check');
    if(res.ok){var data=await res.json();if(data.authenticated)window.location.href='/admin';}
  }catch(e){}
}

function init(){
  initTheme();
  initCursor();
  checkAuth();
  window.addEventListener('load',function(){document.body.style.opacity='1';});
}

if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',init);
else init();
})();
</script>
</body>
</html>
