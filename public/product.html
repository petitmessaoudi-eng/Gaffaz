<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Détail Produit — ComparateurTN</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;600;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
--red:#C0001A;--red-dark:#8B0000;--red-glow:rgba(192,0,26,0.4);--red-subtle:rgba(192,0,26,0.1);--red-border:rgba(192,0,26,0.3);--radius:4px;--nav-h:64px;--transition:0.2s ease;--transition-slow:0.3s ease;
}
[data-theme="dark"]{
--bg-overlay:rgba(5,5,5,0.72);--card-bg:rgba(12,12,12,0.84);--card-hover-bg:rgba(20,20,20,0.92);--card-border:rgba(255,255,255,0.06);--card-hover-border:rgba(192,0,26,0.6);--filter-bg:rgba(10,10,10,0.88);--input-bg:rgba(255,255,255,0.05);--input-border:rgba(255,255,255,0.1);--text-primary:#f5f5f5;--text-secondary:rgba(245,245,245,0.65);--text-muted:rgba(245,245,245,0.38);--divider:rgba(255,255,255,0.07);--skeleton-a:rgba(255,255,255,0.04);--skeleton-b:rgba(192,0,26,0.06);--price-color:#ff2a2a;--navbar-bg:rgba(5,5,5,0.95);--pill-bg:rgba(255,255,255,0.06);--pill-border:rgba(255,255,255,0.1);--scrollbar-thumb:rgba(192,0,26,0.5);--toast-bg:rgba(10,10,10,0.97);
}
[data-theme="light"]{
--bg-overlay:rgba(255,255,255,0.75);--card-bg:rgba(255,255,255,0.88);--card-hover-bg:rgba(255,255,255,0.97);--card-border:rgba(0,0,0,0.08);--card-hover-border:rgba(192,0,26,0.5);--filter-bg:rgba(255,255,255,0.92);--input-bg:rgba(0,0,0,0.04);--input-border:rgba(0,0,0,0.12);--text-primary:#111111;--text-secondary:rgba(17,17,17,0.7);--text-muted:rgba(17,17,17,0.45);--divider:rgba(0,0,0,0.08);--skeleton-a:rgba(0,0,0,0.05);--skeleton-b:rgba(192,0,26,0.05);--price-color:#C0001A;--navbar-bg:rgba(255,255,255,0.96);--pill-bg:rgba(0,0,0,0.04);--pill-border:rgba(0,0,0,0.1);--scrollbar-thumb:rgba(192,0,26,0.4);--toast-bg:rgba(255,255,255,0.98);
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;overflow-x:hidden;}
body{font-family:'Outfit',sans-serif;color:var(--text-primary);min-height:100vh;opacity:0;transition:opacity 0.3s ease;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;z-index:9998;pointer-events:none;opacity:0.03;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");background-repeat:repeat;background-size:200px 200px;}
a{text-decoration:none;color:inherit;}
.page-bg{position:fixed;inset:0;z-index:-2;background-size:cover;background-position:center top;background-repeat:no-repeat;transition:background-image 0.4s ease;}
.page-overlay{position:fixed;inset:0;z-index:-1;background:var(--bg-overlay);backdrop-filter:blur(2px);-webkit-backdrop-filter:blur(2px);transition:background 0.4s ease;}
#cursor-glow{position:fixed;width:280px;height:280px;border-radius:50%;background:radial-gradient(circle,rgba(192,0,26,0.1) 0%,transparent 70%);pointer-events:none;z-index:9997;transform:translate(-50%,-50%);}
::-webkit-scrollbar{width:5px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--scrollbar-thumb);border-radius:3px;}
.navbar{position:sticky;top:0;z-index:100;height:var(--nav-h);background:var(--navbar-bg);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-bottom:1px solid var(--divider);display:flex;align-items:center;padding:0 24px;gap:16px;transition:background var(--transition-slow);box-shadow:0 4px 24px rgba(0,0,0,0.3);}
[data-theme="dark"] .navbar{border-bottom-color:rgba(192,0,26,0.2);}
.page-title{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:3px;color:var(--text-primary);flex-shrink:0;position:relative;padding-bottom:2px;}
.page-title::after{content:'';position:absolute;bottom:-2px;left:0;width:100%;height:2px;background:linear-gradient(90deg,var(--red),transparent);box-shadow:0 0 8px var(--red-glow);}
.page-title span{color:var(--red);}
.navbar-right{display:flex;align-items:center;gap:12px;margin-left:auto;}
.nav-back-btn{display:flex;align-items:center;gap:7px;padding:9px 16px;background:var(--pill-bg);border:1px solid var(--pill-border);border-radius:var(--radius);color:var(--text-secondary);font-family:'Rajdhani',sans-serif;font-size:13px;font-weight:700;letter-spacing:1px;cursor:pointer;transition:all var(--transition);}
.nav-back-btn:hover{border-color:var(--red);color:var(--red);background:var(--red-subtle);}
.theme-toggle{background:none;border:1.5px solid rgba(255,255,255,0.2);color:rgba(255,255,255,0.7);cursor:pointer;padding:7px 14px;border-radius:20px;font-size:0.75rem;font-family:'Rajdhani',sans-serif;font-weight:700;letter-spacing:1px;transition:all var(--transition);flex-shrink:0;}
.theme-toggle:hover{border-color:var(--red);color:var(--red);}
[data-theme="light"] .theme-toggle{border-color:rgba(0,0,0,0.2);color:rgba(0,0,0,0.6);}
[data-theme="light"] .theme-toggle:hover{border-color:var(--red);color:var(--red);}
.breadcrumb{display:flex;align-items:center;gap:8px;padding:14px 24px;font-family:'Rajdhani',sans-serif;font-size:12px;font-weight:600;color:var(--text-muted);flex-wrap:wrap;max-width:1400px;margin:0 auto;width:100%;}
.breadcrumb a{color:var(--text-secondary);transition:color var(--transition);}
.breadcrumb a:hover{color:var(--red);}
.breadcrumb-sep{opacity:0.4;}
.main-wrap{max-width:1400px;margin:0 auto;padding:0 24px 40px;}
.section-gap{margin-bottom:20px;}
.glass-card{background:var(--filter-bg);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border:1px solid var(--card-border);border-radius:var(--radius);padding:20px;position:relative;overflow:hidden;animation:fadeInUp 0.5s ease-out backwards;}
.glass-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--red),transparent);}
@keyframes fadeInUp{from{opacity:0;transform:translateY(24px);}to{opacity:1;transform:translateY(0);}}
@keyframes pulseRed{0%,100%{box-shadow:0 4px 12px rgba(192,0,26,0.5);}50%{box-shadow:0 4px 20px rgba(192,0,26,0.8);}}
@keyframes pulseDot{0%,100%{transform:scale(1);opacity:1;}50%{transform:scale(1.5);opacity:0.5;}}
.section-header{margin-bottom:18px;}
.section-label{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:2px;color:var(--text-primary);display:flex;align-items:center;gap:10px;}
.section-label::before{content:'';display:inline-block;width:3px;height:18px;background:var(--red);border-radius:1px;flex-shrink:0;}
.product-hero{display:grid;grid-template-columns:1fr 1fr;gap:24px;margin-bottom:20px;}
.hero-gallery{animation-delay:0.05s;}
.hero-main-wrap{position:relative;height:360px;border-radius:var(--radius);overflow:hidden;background:var(--input-bg);border:1px solid var(--card-border);cursor:zoom-in;margin-bottom:12px;}
.hero-main-img{width:100%;height:100%;object-fit:contain;padding:20px;transition:transform 0.4s ease;}
.hero-main-wrap:hover .hero-main-img{transform:scale(1.04);}
.hero-img-empty{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;}
.hero-img-empty svg{width:72px;height:72px;opacity:0.12;}
.hero-thumbs{display:flex;gap:10px;flex-wrap:wrap;}
.hero-thumb{width:72px;height:72px;border-radius:var(--radius);overflow:hidden;cursor:pointer;border:2px solid var(--card-border);transition:all var(--transition);background:var(--input-bg);padding:4px;flex-shrink:0;}
.hero-thumb:hover,.hero-thumb.active{border-color:var(--red);box-shadow:0 0 12px var(--red-glow);}
.hero-thumb img{width:100%;height:100%;object-fit:contain;}
.product-info{display:flex;flex-direction:column;animation-delay:0.1s;}
.badge-row{display:flex;align-items:center;gap:8px;margin-bottom:12px;flex-wrap:wrap;}
.cat-badge,.brand-chip{display:inline-flex;align-items:center;padding:4px 12px;border-radius:2px;font-family:'Rajdhani',sans-serif;font-size:12px;font-weight:700;letter-spacing:0.5px;background:var(--pill-bg);border:1px solid var(--pill-border);color:var(--text-secondary);}
.brand-chip{color:var(--red);border-color:var(--red-border);background:var(--red-subtle);}
.product-name{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:2px;line-height:1.15;margin-bottom:18px;color:var(--text-primary);}
.best-price-block{background:rgba(192,0,26,0.08);border:1px solid var(--red-border);border-radius:var(--radius);padding:16px;margin-bottom:16px;position:relative;overflow:hidden;}
.best-price-block::after{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 60% 50% at 50% 0%,rgba(192,0,26,0.06),transparent);pointer-events:none;}
.best-price-label{font-family:'Rajdhani',sans-serif;font-size:10px;font-weight:700;letter-spacing:2px;color:var(--red);text-transform:uppercase;margin-bottom:6px;}
.best-price-val{font-family:'Rajdhani',sans-serif;font-size:36px;font-weight:700;color:var(--price-color);line-height:1;margin-bottom:4px;}
.best-price-store{font-family:'Rajdhani',sans-serif;font-size:13px;font-weight:600;color:var(--text-secondary);}
.best-price-store strong{color:var(--text-primary);}
.buy-btn{display:flex;align-items:center;justify-content:center;gap:9px;width:100%;padding:13px 20px;background:var(--red);color:#fff;font-family:'Rajdhani',sans-serif;font-size:14px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;border:none;cursor:pointer;clip-path:polygon(6px 0%,100% 0%,calc(100% - 6px) 100%,0% 100%);transition:all var(--transition);text-decoration:none;margin-bottom:10px;animation:pulseRed 3s ease-in-out infinite;}
.buy-btn:hover{background:var(--red-dark);box-shadow:0 0 24px var(--red-glow);animation:none;transform:translateY(-1px);}
.buy-btn svg{width:15px;height:15px;flex-shrink:0;}
.share-row{display:flex;gap:8px;margin-bottom:10px;}
.share-btn{flex:1;display:flex;align-items:center;justify-content:center;gap:6px;padding:9px 12px;background:var(--pill-bg);border:1px solid var(--pill-border);border-radius:var(--radius);color:var(--text-secondary);font-family:'Rajdhani',sans-serif;font-size:12px;font-weight:700;letter-spacing:0.5px;cursor:pointer;transition:all var(--transition);}
.share-btn:hover{border-color:var(--red);color:var(--red);background:var(--red-subtle);}
.share-btn svg{width:13px;height:13px;flex-shrink:0;}
.last-updated{font-family:'Rajdhani',sans-serif;font-size:11px;font-weight:600;color:var(--text-muted);text-align:right;letter-spacing:0.5px;}
.description-text{margin-top:14px;padding-top:14px;border-top:1px solid var(--divider);font-size:13px;line-height:1.7;color:var(--text-secondary);}
.price-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;}
.store-card{background:var(--card-bg);backdrop-filter:blur(16px);border:1px solid var(--card-border);border-radius:var(--radius);padding:16px;position:relative;overflow:hidden;transition:all var(--transition-slow);animation:fadeInUp 0.5s ease-out backwards;}
.store-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;transition:opacity var(--transition);}
.store-card:hover{background:var(--card-hover-bg);border-color:var(--card-hover-border);transform:translateY(-4px);box-shadow:0 16px 40px rgba(0,0,0,0.4);}
.store-card.is-best{border-color:var(--red-border);}
.store-card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.store-name-row{display:flex;align-items:center;gap:8px;font-family:'Rajdhani',sans-serif;font-size:14px;font-weight:700;color:var(--text-primary);}
.store-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.best-badge{padding:3px 10px;background:var(--red);color:#fff;font-family:'Rajdhani',sans-serif;font-size:10px;font-weight:700;letter-spacing:0.5px;text-transform:uppercase;clip-path:polygon(5px 0%,100% 0%,calc(100% - 5px) 100%,0% 100%);animation:pulseRed 2s ease-in-out infinite;}
.store-price{font-family:'Rajdhani',sans-serif;font-size:26px;font-weight:700;margin-bottom:4px;line-height:1;}
.store-diff{font-family:'Rajdhani',sans-serif;font-size:11px;font-weight:600;margin-bottom:10px;display:inline-block;padding:2px 6px;border-radius:2px;}
.store-diff.cheaper{color:#16a34a;background:rgba(22,163,74,0.08);}
.store-diff.pricier{color:#dc2626;background:rgba(220,38,38,0.08);}
.stock-row{display:flex;align-items:center;gap:8px;margin-bottom:14px;font-family:'Rajdhani',sans-serif;font-size:12px;font-weight:600;}
.stock-indicator{width:8px;height:8px;border-radius:50%;flex-shrink:0;position:relative;}
.stock-indicator.in-stock{background:#16a34a;}
.stock-indicator.in-stock::after{content:'';position:absolute;inset:-3px;border-radius:50%;background:#16a34a;opacity:0.3;animation:pulseDot 2s ease-in-out infinite;}
.stock-indicator.out-stock{background:#dc2626;}
.store-buy-btn{display:flex;align-items:center;justify-content:center;gap:7px;width:100%;padding:10px;border:none;border-radius:0;font-family:'Rajdhani',sans-serif;font-size:12px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;transition:all var(--transition);text-decoration:none;clip-path:polygon(5px 0%,100% 0%,calc(100% - 5px) 100%,0% 100%);}
.store-buy-btn:hover{transform:translateY(-1px);}
.store-buy-btn svg{width:12px;height:12px;}
.no-price-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:28px 16px;opacity:0.45;}
.no-price-wrap svg{width:32px;height:32px;margin-bottom:8px;}
.no-price-wrap span{font-family:'Rajdhani',sans-serif;font-size:12px;font-weight:600;}
.chart-wrap{position:relative;width:100%;height:260px;overflow:hidden;}
canvas#priceChart{width:100%!important;height:100%!important;}
.chart-legend{display:flex;gap:20px;flex-wrap:wrap;margin-bottom:16px;}
.legend-item{display:flex;align-items:center;gap:8px;font-family:'Rajdhani',sans-serif;font-size:13px;font-weight:600;color:var(--text-secondary);cursor:pointer;transition:opacity var(--transition);}
.legend-item.hidden{opacity:0.35;}
.legend-dot{width:12px;height:3px;border-radius:2px;}
.chart-tooltip{position:absolute;pointer-events:none;opacity:0;transition:opacity 0.15s ease;background:var(--toast-bg);backdrop-filter:blur(12px);border:1px solid var(--card-border);border-radius:var(--radius);padding:10px 14px;min-width:160px;z-index:10;}
.chart-tt-date{font-family:'Rajdhani',sans-serif;font-size:11px;color:var(--text-muted);margin-bottom:6px;}
.chart-tt-row{display:flex;align-items:center;justify-content:space-between;gap:14px;font-family:'Rajdhani',sans-serif;font-size:12px;font-weight:700;margin-bottom:3px;}
.chart-tt-store{display:flex;align-items:center;gap:6px;}
.chart-tt-dot{width:8px;height:8px;border-radius:50%;}
.specs-grid{display:grid;grid-template-columns:1fr 1fr;gap:0;}
.spec-row{display:flex;align-items:center;padding:10px 14px;border-bottom:1px solid var(--divider);transition:background var(--transition);gap:14px;}
.spec-row:hover{background:var(--red-subtle);}
.spec-row:nth-child(even){background:rgba(255,255,255,0.015);}
[data-theme="light"] .spec-row:nth-child(even){background:rgba(0,0,0,0.02);}
.spec-row:nth-child(even):hover{background:var(--red-subtle);}
.spec-label{font-family:'Rajdhani',sans-serif;font-size:12px;font-weight:700;color:var(--text-muted);min-width:140px;flex-shrink:0;letter-spacing:0.3px;}
.spec-value{font-family:'Outfit',sans-serif;font-size:13px;color:var(--text-primary);}
.related-scroll{display:flex;gap:14px;overflow-x:auto;padding-bottom:10px;scroll-snap-type:x mandatory;-webkit-overflow-scrolling:touch;}
.related-scroll::-webkit-scrollbar{height:5px;}
.related-scroll::-webkit-scrollbar-track{background:rgba(255,255,255,0.04);border-radius:3px;}
.related-scroll::-webkit-scrollbar-thumb{background:var(--red);border-radius:3px;}
.related-card{flex:0 0 180px;scroll-snap-align:start;border-radius:var(--radius);background:var(--card-bg);border:1px solid var(--card-border);overflow:hidden;cursor:pointer;transition:all var(--transition-slow);position:relative;}
.related-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--red),transparent);opacity:0;transition:opacity var(--transition);}
.related-card:hover{border-color:var(--card-hover-border);transform:translateY(-6px);box-shadow:0 20px 40px rgba(0,0,0,0.4),0 0 30px rgba(192,0,26,0.15);}
.related-card:hover::before{opacity:1;}
.related-img{width:100%;height:120px;object-fit:contain;padding:10px;}
.related-img-empty{width:100%;height:120px;display:flex;align-items:center;justify-content:center;}
.related-img-empty svg{width:36px;height:36px;opacity:0.15;}
.related-body{padding:10px;}
.related-name{font-family:'Outfit',sans-serif;font-size:12px;line-height:1.4;margin-bottom:6px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;color:var(--text-primary);}
.related-price{font-family:'Rajdhani',sans-serif;font-size:14px;font-weight:700;color:var(--price-color);}
.lightbox{position:fixed;inset:0;z-index:500;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,0.92);backdrop-filter:blur(12px);opacity:0;pointer-events:none;transition:opacity 0.3s ease;}
.lightbox.open{opacity:1;pointer-events:all;}
.lightbox-img{max-width:90vw;max-height:85vh;object-fit:contain;border-radius:var(--radius);}
.lightbox-close,.lightbox-nav{position:absolute;width:42px;height:42px;background:var(--pill-bg);backdrop-filter:blur(10px);border:1px solid var(--pill-border);border-radius:var(--radius);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all var(--transition);color:var(--text-secondary);}
.lightbox-close:hover,.lightbox-nav:hover{background:var(--red-subtle);border-color:var(--red);color:var(--red);}
.lightbox-close{top:20px;right:20px;}
.lightbox-close svg,.lightbox-nav svg{width:18px;height:18px;}
.lightbox-nav.prev{left:20px;top:50%;transform:translateY(-50%);}
.lightbox-nav.next{right:20px;top:50%;transform:translateY(-50%);}
.toast-container{position:fixed;top:20px;right:20px;z-index:9999;display:flex;flex-direction:column;gap:8px;}
.toast{background:var(--toast-bg);backdrop-filter:blur(16px);border:1px solid var(--card-border);border-radius:var(--radius);padding:12px 18px;display:flex;align-items:center;gap:10px;min-width:260px;box-shadow:0 16px 40px rgba(0,0,0,0.4);font-family:'Rajdhani',sans-serif;font-size:13px;font-weight:600;animation:toastIn 0.3s ease;}
@keyframes toastIn{from{opacity:0;transform:translateX(30px);}to{opacity:1;transform:translateX(0);}}
@keyframes toastOut{from{opacity:1;transform:translateX(0);}to{opacity:0;transform:translateX(30px);}}
.mobile-bottom-nav{display:none;position:fixed;bottom:0;left:0;right:0;z-index:200;background:var(--navbar-bg);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-top:1px solid var(--divider);padding:8px 16px 12px;padding-bottom:max(12px,env(safe-area-inset-bottom));}
.mob-nav-inner{display:flex;gap:10px;align-items:center;}
.mob-buy-btn{flex:1;display:flex;align-items:center;justify-content:center;gap:8px;padding:12px 16px;background:var(--red);color:#fff;font-family:'Rajdhani',sans-serif;font-size:14px;font-weight:700;letter-spacing:1px;text-transform:uppercase;border:none;cursor:pointer;clip-path:polygon(6px 0%,100% 0%,calc(100% - 6px) 100%,0% 100%);text-decoration:none;min-height:46px;}
.mob-buy-btn svg{width:15px;height:15px;}
.mob-icon-btn{width:46px;height:46px;background:var(--pill-bg);border:1px solid var(--pill-border);border-radius:var(--radius);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text-secondary);flex-shrink:0;}
.mob-icon-btn svg{width:17px;height:17px;}
.site-footer{text-align:center;padding:20px 24px;font-family:'Rajdhani',sans-serif;font-size:11px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--text-muted);border-top:1px solid var(--divider);}
.site-footer::before{content:'';display:block;width:60px;height:2px;background:linear-gradient(90deg,var(--red),transparent);margin:0 auto 12px;}
.page-loading{display:flex;align-items:center;justify-content:center;min-height:50vh;flex-direction:column;gap:16px;color:var(--text-muted);}
.spinner{width:36px;height:36px;border:3px solid var(--card-border);border-top-color:var(--red);border-radius:50%;animation:spin 1s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
@media(max-width:1200px){.price-grid{grid-template-columns:repeat(2,1fr);}}
@media(max-width:992px){
.product-hero{grid-template-columns:1fr;}
.hero-main-wrap{height:300px;}
.specs-grid{grid-template-columns:1fr;}
}
@media(max-width:768px){
.main-wrap{padding:0 14px 100px;}
.breadcrumb{padding:10px 14px;}
.navbar{padding:0 14px;}
.hero-main-wrap{height:260px;}
.product-name{font-size:22px;}
.best-price-val{font-size:28px;}
.buy-btn,.share-row{display:none;}
.mobile-bottom-nav{display:block;}
.chart-wrap{height:200px;}
.related-card{flex:0 0 150px;}
}
@media(max-width:480px){
.price-grid{grid-template-columns:1fr;}
.store-card{padding:14px;}
.store-price{font-size:22px;}
.product-name{font-size:19px;}
.best-price-val{font-size:24px;}
.toast-container{left:12px;right:12px;top:auto;bottom:80px;}
.toast{min-width:unset;width:100%;}
}
</style>
</head>
<body>

<div class="page-overlay"></div>
<div id="cursor-glow" aria-hidden="true"></div>
<div class="toast-container" id="toastContainer"></div>

  <button class="lightbox-nav prev" id="lightboxPrev"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg></button>

    </a>
    <button class="mob-buy-btn" id="mobBuyDisabled" style="display:none;opacity:0.5;cursor:not-allowed;">

    </button>
    <button class="mob-icon-btn" onclick="shareProduct()" aria-label="Partager">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>

    </div>
  </div>

<footer class="site-footer">© 2026 ComparateurTN — Comparez les prix Tunisianet, SpaceNet, Skymil &amp; Mytek</footer>

<script>
(function(){
'use strict';

var STORES={Tunisianet:{color:'#e2001a'},SpaceNet:{color:'#0066cc'},Skymil:{color:'#ff6600'},Mytek:{color:'#00933b'}};
var STORE_NAMES=Object.keys(STORES);
var product=null;
var lightboxImages=[];
var lightboxIdx=0;
var hiddenStores=new Set();
var chartData={labels:[],datasets:[]};
var resizeTimer=null;

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function fmtPrice(n){if(n==null)return '—';return Number(n).toLocaleString('fr-TN',{minimumFractionDigits:0,maximumFractionDigits:0})+' TND';}
function timeAgo(d){if(!d)return '';var s=Math.floor((Date.now()-new Date(d))/1000);if(s<60)return "à l'instant";if(s<3600)return Math.floor(s/60)+' min';if(s<86400)return Math.floor(s/3600)+'h';return Math.floor(s/86400)+'j';}
function getSlug(){var parts=window.location.pathname.split('/');return parts[parts.length-1]||'';}
function formatSpecLabel(key){var map={brand:'Marque',processor:'Processeur',processorGen:'Génération',ram:'RAM',storage:'Stockage',storageType:'Type stockage',gpu:'GPU',gpuVram:'VRAM',screenSize:'Taille écran',screenResolution:'Résolution',screenType:'Type écran',battery:'Batterie',os:'Système',weight:'Poids',color:'Couleur',usage:'Usage',refreshRate:'Fréq. rafraîch.',panelType:'Type panneau',responseTime:'Temps réponse',ports:'Ports',curved:'Incurvé',hdr:'HDR',connectivity:'Connectivité',camera:'Caméra principale',frontCamera:'Caméra avant',simSlots:'Empl. SIM',chargingSpeed:'Charge rapide',stylus:'Stylet',channels:'Canaux',power:'Puissance',waterproof:'Étanche',noiseCancelling:'Réd. bruit',type:'Type',capacity:'Capacité',energyClass:'Classe énergie',dimensions:'Dimensions',spinSpeed:'Vitesse essorage',steamFunction:'Vapeur',formFactor:'Format',inverter:'Inverseur',hotCold:'Chaud/Froid',burners:'Brûleurs',ovenVolume:'Volume four',programs:'Programmes',grill:'Grill',convection:'Convection',suction:'Aspiration',bagless:'Sans sac',filtration:'Filtration',resolution:'Résolution',smartTV:'Smart TV',socket:'Socket',cores:'Cœurs',tdp:'TDP (W)',vram:'VRAM (Go)',vramType:'Type VRAM',pcie:'PCIe',rgb:'RGB',interface:'Interface',readSpeed:'Lecture',chipset:'Chipset',ramType:'Type RAM',wifi:'Wi-Fi'};return map[key]||(key.charAt(0).toUpperCase()+key.slice(1).replace(/([A-Z])/g,' $1'));}

window.navigateTo=function(href){document.body.style.opacity='0';document.body.style.transition='opacity 0.3s ease';setTimeout(function(){window.location.href=href;},300);};

function showToast(msg,type){type=type||'success';var c=document.getElementById('toastContainer');var t=document.createElement('div');t.className='toast';var col=type==='success'?'#16a34a':type==='error'?'#dc2626':'var(--red)';t.innerHTML='<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="'+col+'" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg><span>'+esc(msg)+'</span>';c.appendChild(t);setTimeout(function(){t.style.animation='toastOut 0.3s ease forwards';setTimeout(function(){t.remove();},300);},3500);}

window.copyLink=function(){navigator.clipboard.writeText(window.location.href).then(function(){showToast('Lien copié !');}).catch(function(){showToast('Erreur de copie','error');});};
window.shareProduct=function(){if(navigator.share&&product){navigator.share({title:product.name,url:window.location.href}).catch(function(){});}else{copyLink();}};

function applyTheme(t){document.documentElement.setAttribute('data-theme',t);localStorage.setItem('theme',t);var btn=document.getElementById('themeBtn');if(btn)btn.textContent=t==='dark'?'◐ MODE':'☀ MODE';var bg=document.querySelector('.page-bg');if(bg)bg.style.backgroundImage="url('"+window.location.origin+(t==='dark'?'/dark.jpg':'/light.jpg')+"')";if(chartData.labels.length)drawChart(chartData.labels,chartData.datasets);}
window.toggleTheme=function(){var cur=document.documentElement.getAttribute('data-theme');applyTheme(cur==='dark'?'light':'dark');};
function initTheme(){var saved=localStorage.getItem('theme')||'dark';applyTheme(saved);}

window.switchMainImg=function(idx){lightboxIdx=idx;var mainImg=document.getElementById('mainImg');if(mainImg&&lightboxImages[idx])mainImg.src=lightboxImages[idx];document.querySelectorAll('.hero-thumb').forEach(function(t,i){t.classList.toggle('active',i===idx);});};
window.openLightbox=function(idx){if(!lightboxImages.length)return;lightboxIdx=idx;document.getElementById('lightboxImg').src=lightboxImages[idx];document.getElementById('lightbox').classList.add('open');document.body.style.overflow='hidden';};
function closeLightbox(){document.getElementById('lightbox').classList.remove('open');document.body.style.overflow='';}
window.lightboxNavFn=function(dir){lightboxIdx=(lightboxIdx+dir+lightboxImages.length)%lightboxImages.length;document.getElementById('lightboxImg').src=lightboxImages[lightboxIdx];};

function initLightbox(){
  document.getElementById('lightboxClose').onclick=closeLightbox;
  document.getElementById('lightboxPrev').onclick=function(){lightboxNavFn(-1);};
  document.getElementById('lightboxNext').onclick=function(){lightboxNavFn(1);};
  document.getElementById('lightbox').onclick=function(e){if(e.target===this)closeLightbox();};
  document.addEventListener('keydown',function(e){if(e.key==='Escape')closeLightbox();if(e.key==='ArrowLeft')lightboxNavFn(-1);if(e.key==='ArrowRight')lightboxNavFn(1);});
}

async function loadProduct(){
  var slug=getSlug();
  if(!slug){renderError('Produit introuvable.');return;}
  try{
    var res=await fetch('/api/product/'+encodeURIComponent(slug));
    if(!res.ok)throw new Error('not found');
    var data=await res.json();
    product=data.product;
    if(!product){renderError('Produit introuvable.');return;}
    renderProduct();
    loadRelated();
  }catch(e){renderError('Impossible de charger ce produit.');}
}

function renderError(msg){
  document.getElementById('pageContent').innerHTML='<div class="page-loading"><svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="opacity:0.2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg><span style="font-family:Rajdhani,sans-serif;font-size:15px;font-weight:600;">'+esc(msg)+'</span><a href="/products" style="color:var(--red);font-family:Rajdhani,sans-serif;font-size:13px;font-weight:700;">← Retour aux produits</a></div>';
}

function renderProduct(){
  var p=product;
  document.title=esc(p.name)+' — ComparateurTN';
  document.getElementById('bcCategory').textContent=p.category||'';
  document.getElementById('bcName').textContent=p.name.length>42?p.name.slice(0,42)+'…':p.name;
  lightboxImages=p.images&&p.images.length?p.images:[];
  var bestEntry=p.prices&&p.prices.find(function(pr){return pr.store===p.bestPriceStore&&pr.inStock!==false;});
  var bestUrl=bestEntry&&bestEntry.url?bestEntry.url:'#';
  var mobBuy=document.getElementById('mobBuyBtn');
  var mobDis=document.getElementById('mobBuyDisabled');
  if(mobBuy&&mobDis){if(bestUrl&&bestUrl!=='#'){mobBuy.href=bestUrl;mobBuy.style.display='flex';mobDis.style.display='none';}else{mobBuy.style.display='none';mobDis.style.display='flex';}}
  var specs=p.specs||{};
  var specRows=Object.entries(specs).filter(function(e){return e[1]!=null&&e[1]!=='';}).map(function(e){return '<div class="spec-row"><span class="spec-label">'+esc(formatSpecLabel(e[0]))+'</span><span class="spec-value">'+esc(String(e[1]))+'</span></div>';}).join('');
  var html='';
  html+='<div class="product-hero section-gap">';
  html+='<div class="glass-card hero-gallery" style="padding:16px;animation-delay:0.05s;">';
  html+='<div class="hero-main-wrap" id="mainImgWrap" onclick="openLightbox(0)">';
  if(lightboxImages[0]){html+='<img class="hero-main-img" id="mainImg" src="'+esc(lightboxImages[0])+'" alt="'+esc(p.name)+'" loading="eager" onerror="this.style.display=\'none\'">';}
  else{html+='<div class="hero-img-empty"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg></div>';}
  html+='</div>';
  html+='<div class="hero-thumbs">';
  lightboxImages.slice(0,6).forEach(function(img,i){html+='<div class="hero-thumb'+(i===0?' active':'')+'" onclick="switchMainImg('+i+')" data-idx="'+i+'"><img src="'+esc(img)+'" alt="" loading="lazy" onerror="this.parentElement.style.display=\'none\'"></div>';});
  html+='</div></div>';
  html+='<div class="glass-card product-info" style="animation-delay:0.1s;">';
  html+='<div class="badge-row"><span class="cat-badge">'+esc(p.category||'Produit')+'</span>';
  if(p.brand)html+='<span class="brand-chip">'+esc(p.brand)+'</span>';
  html+='</div>';
  html+='<h2 class="product-name">'+esc(p.name)+'</h2>';
  html+='<div class="best-price-block"><div class="best-price-label">Meilleur Prix</div><div class="best-price-val">'+fmtPrice(p.bestPrice)+'</div><div class="best-price-store">Chez <strong>'+esc(p.bestPriceStore||'—')+'</strong></div></div>';
  if(bestUrl&&bestUrl!=='#'){html+='<a class="buy-btn" href="'+esc(bestUrl)+'" target="_blank" rel="noopener noreferrer"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>Acheter au meilleur prix</a>';}
  else{html+='<button class="buy-btn" disabled style="opacity:0.5;cursor:not-allowed;animation:none;"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/></svg>Prix non disponible</button>';}
  html+='<div class="share-row">';
  html+='<button class="share-btn" onclick="copyLink()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>Copier le lien</button>';
  html+='<button class="share-btn" onclick="shareProduct()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>Partager</button>';
  html+='</div>';
  html+='<div class="last-updated">Mis à jour '+timeAgo(p.updatedAt)+'</div>';
  if(p.description)html+='<div class="description-text">'+esc(p.description)+'</div>';
  html+='</div></div>';
  html+='<div class="glass-card section-gap" style="animation-delay:0.15s;"><div class="section-header"><span class="section-label">Comparaison des Prix</span></div><div class="price-grid" id="priceGrid">'+renderPriceCards(p)+'</div></div>';
  html+='<div class="glass-card section-gap" style="animation-delay:0.2s;"><div class="section-header"><span class="section-label">Historique des Prix</span></div><div class="chart-legend" id="chartLegend"></div><div class="chart-wrap"><canvas id="priceChart"></canvas><div class="chart-tooltip" id="chartTooltip"></div></div></div>';
  if(specRows){html+='<div class="glass-card section-gap" style="animation-delay:0.25s;"><div class="section-header"><span class="section-label">Caractéristiques Techniques</span></div><div class="specs-grid">'+specRows+'</div></div>';}
  html+='<div class="glass-card section-gap" style="animation-delay:0.3s;"><div class="section-header"><span class="section-label">Produits Similaires</span></div><div class="related-scroll" id="relatedScroll">';
  for(var ri=0;ri<6;ri++){html+='<div class="related-card"><div style="width:100%;height:120px;background:var(--skeleton-a);animation:fadeInUp 1.2s ease-out infinite alternate;"></div><div class="related-body"><div style="height:10px;background:var(--skeleton-a);border-radius:2px;margin-bottom:6px;width:80%;"></div><div style="height:10px;background:var(--skeleton-a);border-radius:2px;width:50%;"></div></div></div>';}
  html+='</div></div>';
  document.getElementById('pageContent').innerHTML=html;
  renderChart();
}

function renderPriceCards(p){
  var prices=p.prices||[];
  var bestP=p.bestPrice;
  return STORE_NAMES.map(function(sname,i){
    var entry=prices.find(function(x){return x.store===sname;});
    var delay=(i*0.07)+'s';
    var sc=STORES[sname].color;
    if(!entry||!entry.price){
      return '<div class="store-card" style="animation-delay:'+delay+'"><div style="position:absolute;top:0;left:0;right:0;height:3px;background:'+sc+';opacity:0.3;"></div><div class="store-card-header"><div class="store-name-row"><span class="store-dot" style="background:'+sc+'"></span>'+esc(sname)+'</div></div><div class="no-price-wrap"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><line x1="4.93" y1="4.93" x2="19.07" y2="19.07"/></svg><span>Non disponible</span></div></div>';
    }
    var isBest=entry.price===bestP;
    var diff=entry.price-bestP;
    var diffHtml=isBest?'<div class="store-diff cheaper">✓ Meilleur prix</div>':diff>0?'<div class="store-diff pricier">+'+fmtPrice(diff)+'</div>':'';
    var stockIn=entry.inStock!==false;
    var btnStyle=isBest?'background:'+sc+';color:#fff;':'background:'+sc+'18;color:'+sc+';border:1px solid '+sc+'40;';
    return '<div class="store-card'+(isBest?' is-best':'')+'" style="animation-delay:'+delay+'"><div style="position:absolute;top:0;left:0;right:0;height:3px;background:'+sc+';">&nbsp;</div><div class="store-card-header"><div class="store-name-row"><span class="store-dot" style="background:'+sc+'"></span>'+esc(sname)+'</div>'+(isBest?'<span class="best-badge">Meilleur</span>':'')+'</div><div class="store-price" style="color:'+(isBest?sc:'var(--text-primary)')+'">'+fmtPrice(entry.price)+'</div>'+diffHtml+'<div class="stock-row"><span class="stock-indicator '+(stockIn?'in-stock':'out-stock')+'"></span><span style="color:'+(stockIn?'#16a34a':'#dc2626')+'">'+(stockIn?'En stock':'Rupture')+'</span></div>'+(entry.url?'<a class="store-buy-btn" href="'+esc(entry.url)+'" target="_blank" rel="noopener noreferrer" style="'+btnStyle+'"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>Acheter</a>':'<button class="store-buy-btn" disabled style="'+btnStyle+'opacity:0.5;cursor:not-allowed;">Indisponible</button>')+'</div>';
  }).join('');
}

function renderChart(){
  var p=product;
  var prices=p.prices||[];
  var history=p.priceHistory||[];
  var createdAt=p.createdAt?new Date(p.createdAt):new Date();
  var today=new Date();
  function toMidnight(d){var x=new Date(d);x.setHours(0,0,0,0);return x;}
  var startDay=toMidnight(createdAt);
  var endDay=toMidnight(today);
  var totalDays=Math.max(1,Math.round((endDay-startDay)/86400000));
  var maxPoints=60;
  var step=totalDays<=maxPoints?1:Math.ceil(totalDays/maxPoints);
  var dayTimestamps=[];
  for(var offset=0;offset<=totalDays;offset+=step){var d=new Date(startDay);d.setDate(d.getDate()+offset);dayTimestamps.push(d);}
  if(dayTimestamps[dayTimestamps.length-1].getTime()!==endDay.getTime())dayTimestamps.push(new Date(endDay));
  var labels=dayTimestamps.map(function(d){return d.toLocaleDateString('fr-TN',{day:'2-digit',month:'short'});});
  var datasets=[];
  STORE_NAMES.forEach(function(sname){
    var currentEntry=prices.find(function(x){return x.store===sname;});
    if(!currentEntry||!currentEntry.price)return;
    var storeHistory=history.filter(function(h){return h.store===sname&&h.price!=null&&h.price>0;}).map(function(h){return{date:toMidnight(new Date(h.date)),price:h.price};}).sort(function(a,b){return a.date-b.date;});
    if(!storeHistory.length)storeHistory.push({date:new Date(startDay),price:currentEntry.price});
    var lastH=storeHistory[storeHistory.length-1];
    if(Math.abs(lastH.price-currentEntry.price)>0.001){var lud=currentEntry.lastUpdated?toMidnight(new Date(currentEntry.lastUpdated)):new Date(endDay);storeHistory.push({date:lud,price:currentEntry.price});}
    var data=dayTimestamps.map(function(dayD){var price=null;for(var i=storeHistory.length-1;i>=0;i--){if(storeHistory[i].date<=dayD){price=storeHistory[i].price;break;}}if(price===null)price=storeHistory[0].price;return price;});
    datasets.push({store:sname,color:STORES[sname].color,data:data});
  });
  if(!datasets.length){var leg=document.getElementById('chartLegend');if(leg)leg.innerHTML='<span style="font-family:Rajdhani,sans-serif;font-size:13px;font-weight:600;color:var(--text-muted);">Aucune donnée de prix disponible.</span>';return;}
  chartData={labels:labels,datasets:datasets};
  renderLegend(datasets);
  drawChart(labels,datasets);
}

function renderLegend(datasets){
  var c=document.getElementById('chartLegend');
  if(!c)return;
  c.innerHTML=datasets.map(function(ds){return '<div class="legend-item" data-store="'+esc(ds.store)+'" onclick="toggleStore(\''+esc(ds.store)+'\')"><span class="legend-dot" style="background:'+ds.color+'"></span>'+esc(ds.store)+'</div>';}).join('');
}

window.toggleStore=function(store){if(hiddenStores.has(store))hiddenStores.delete(store);else hiddenStores.add(store);document.querySelectorAll('.legend-item').forEach(function(el){el.classList.toggle('hidden',hiddenStores.has(el.dataset.store));});drawChart(chartData.labels,chartData.datasets);};

function drawChart(labels,datasets){
  var canvas=document.getElementById('priceChart');
  if(!canvas)return;
  var wrap=canvas.parentElement;
  var W=wrap.clientWidth||700;
  var isMob=W<480;
  var H=isMob?180:W<768?200:260;
  wrap.style.height=H+'px';
  canvas.width=W*window.devicePixelRatio;
  canvas.height=H*window.devicePixelRatio;
  canvas.style.width=W+'px';
  canvas.style.height=H+'px';
  var ctx=canvas.getContext('2d');
  ctx.scale(window.devicePixelRatio,window.devicePixelRatio);
  ctx.clearRect(0,0,W,H);
  var visDS=datasets.filter(function(ds){return !hiddenStores.has(ds.store);});
  if(!visDS.length)return;
  var pL=isMob?46:64,pR=isMob?10:20,pT=isMob?14:20,pB=isMob?28:36;
  var cW=W-pL-pR,cH=H-pT-pB;
  var allVals=visDS.flatMap(function(ds){return ds.data;});
  var minV=Math.min.apply(null,allVals)*0.97,maxV=Math.max.apply(null,allVals)*1.03;
  var range=maxV-minV||1;
  var isDark=document.documentElement.getAttribute('data-theme')!=='light';
  var gridCol=isDark?'rgba(255,255,255,0.06)':'rgba(0,0,0,0.06)';
  var textCol=isDark?'rgba(245,245,244,0.4)':'rgba(26,26,26,0.4)';
  var fs=isMob?9:11;
  var maxXL=isMob?4:7;
  var xStep=Math.ceil(labels.length/maxXL);
  var gridN=isMob?4:5;
  ctx.strokeStyle=gridCol;ctx.lineWidth=1;
  for(var gi=0;gi<=gridN;gi++){var gy=pT+cH-(cH*gi/gridN);ctx.beginPath();ctx.moveTo(pL,gy);ctx.lineTo(pL+cW,gy);ctx.stroke();var gv=minV+range*gi/gridN;ctx.fillStyle=textCol;ctx.font=fs+'px Rajdhani,sans-serif';ctx.textAlign='right';ctx.fillText(isMob?Math.round(gv/1000)+'k':Math.round(gv).toLocaleString(),pL-4,gy+4);}
  ctx.fillStyle=textCol;ctx.font=fs+'px Rajdhani,sans-serif';ctx.textAlign='center';
  labels.forEach(function(lbl,i){if(i%xStep!==0&&i!==labels.length-1)return;var x=pL+i/(labels.length-1)*cW;ctx.fillText(lbl,x,H-pB+16);});
  visDS.forEach(function(ds){
    var pts=ds.data.map(function(v,i){return{x:pL+i/(labels.length-1)*cW,y:pT+cH-(v-minV)/range*cH};});
    var grad=ctx.createLinearGradient(0,pT,0,pT+cH);grad.addColorStop(0,ds.color+'30');grad.addColorStop(1,ds.color+'00');
    ctx.beginPath();ctx.moveTo(pts[0].x,pT+cH);pts.forEach(function(pt){ctx.lineTo(pt.x,pt.y);});ctx.lineTo(pts[pts.length-1].x,pT+cH);ctx.closePath();ctx.fillStyle=grad;ctx.fill();
    ctx.beginPath();ctx.strokeStyle=ds.color;ctx.lineWidth=2.5;ctx.lineJoin='round';pts.forEach(function(pt,i){i===0?ctx.moveTo(pt.x,pt.y):ctx.lineTo(pt.x,pt.y);});ctx.stroke();
    var last=pts[pts.length-1];ctx.beginPath();ctx.arc(last.x,last.y,5,0,Math.PI*2);ctx.fillStyle=ds.color;ctx.fill();ctx.strokeStyle=isDark?'rgba(5,5,5,0.9)':'rgba(255,255,255,0.9)';ctx.lineWidth=2;ctx.stroke();
  });
  var tooltip=document.getElementById('chartTooltip');
  function showTT(mx){var idx=Math.round((mx-pL)/cW*(labels.length-1));if(idx<0||idx>=labels.length){tooltip.style.opacity='0';return;}tooltip.style.opacity='1';var html='<div class="chart-tt-date">'+labels[idx]+'</div>';visDS.forEach(function(ds){html+='<div class="chart-tt-row"><span class="chart-tt-store"><span class="chart-tt-dot" style="background:'+ds.color+'"></span>'+esc(ds.store)+'</span><span style="color:'+ds.color+'">'+fmtPrice(ds.data[idx])+'</span></div>';});tooltip.innerHTML=html;var tw=tooltip.offsetWidth||160;var tx=Math.max(0,Math.min(mx+12,W-tw-10));tooltip.style.left=tx+'px';tooltip.style.top='8px';}
  canvas.onmousemove=function(e){var r=canvas.getBoundingClientRect();showTT(e.clientX-r.left);};
  canvas.onmouseleave=function(){tooltip.style.opacity='0';};
  canvas.ontouchstart=function(e){e.preventDefault();var r=canvas.getBoundingClientRect();showTT(e.touches[0].clientX-r.left);};
  canvas.ontouchmove=function(e){e.preventDefault();var r=canvas.getBoundingClientRect();showTT(e.touches[0].clientX-r.left);};
  canvas.ontouchend=function(){setTimeout(function(){tooltip.style.opacity='0';},1500);};
}

async function loadRelated(){
  if(!product)return;
  try{
    var res=await fetch('/api/products?category='+encodeURIComponent(product.category||'')+'&limit=7&page=1');
    var data=await res.json();
    var related=(data.products||[]).filter(function(p){return p.slug!==product.slug;}).slice(0,6);
    var container=document.getElementById('relatedScroll');
    if(!container)return;
    if(!related.length){container.innerHTML='<span style="color:var(--text-muted);font-family:Rajdhani,sans-serif;font-size:13px;font-weight:600;padding:20px;display:block;">Aucun produit similaire.</span>';return;}
    container.innerHTML=related.map(function(p){
      return '<div class="related-card" onclick="navigateTo(\'/product/'+esc(p.slug||'')+'\')">'+(p.images&&p.images[0]?'<img class="related-img" src="'+esc(p.images[0])+'" alt="'+esc(p.name)+'" loading="lazy" onerror="this.parentElement.style.opacity=\'0.4\'">':'<div class="related-img-empty"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg></div>')+'<div class="related-body"><div class="related-name">'+esc(p.name)+'</div><div class="related-price">'+fmtPrice(p.bestPrice)+'</div></div></div>';
    }).join('');
  }catch(e){}
}

function initCursorGlow(){
  var cg=document.getElementById('cursor-glow');
  if(!cg)return;
  document.addEventListener('mousemove',function(e){cg.style.left=e.clientX+'px';cg.style.top=e.clientY+'px';});
  document.addEventListener('mouseenter',function(){cg.style.opacity='1';});
  document.addEventListener('mouseleave',function(){cg.style.opacity='0';});
}

window.addEventListener('resize',function(){clearTimeout(resizeTimer);resizeTimer=setTimeout(function(){if(chartData.labels.length)drawChart(chartData.labels,chartData.datasets);},200);});

function init(){
  initTheme();
  initLightbox();
  initCursorGlow();
  window.addEventListener('load',function(){document.body.style.opacity='1';});
  loadProduct();
}

if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',init);
else init();

})();
</script>
</body>
