<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inscription — ComparateurTN</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --emerald:#059669; --emerald-light:#34d399;
  --gold:#d4a574; --gold-light:#e8c9a0;
  --coral:#e07a5f;
  --glass-bg:rgba(255,255,255,0.05); --glass-border:rgba(255,255,255,0.1);
  --glass-shadow:rgba(0,0,0,0.3); --glass-hover:rgba(255,255,255,0.08);
  --bg-dark:#0a0f0d; --bg-gradient-1:#0d1a14; --bg-gradient-2:#132419; --bg-gradient-3:#1a2e23;
  --text-primary:#f5f5f4; --text-secondary:rgba(245,245,244,0.7); --text-muted:rgba(245,245,244,0.4);
  --success:#22c55e; --danger:#dc2626;
  --transition-fast:0.2s ease; --transition-normal:0.3s ease;
}
[data-theme="light"] {
  --glass-bg:rgba(255,255,255,0.6); --glass-border:rgba(0,0,0,0.1);
  --glass-shadow:rgba(0,0,0,0.1); --glass-hover:rgba(255,255,255,0.8);
  --bg-dark:#f5f5f0; --bg-gradient-1:#e8f5e9; --bg-gradient-2:#f1f8e9; --bg-gradient-3:#fefefe;
  --text-primary:#1a1a1a; --text-secondary:rgba(26,26,26,0.7); --text-muted:rgba(26,26,26,0.5);
}
[data-theme="light"] .orb { opacity:.15; }
*,*::before,*::after { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior:smooth; }
body {
  font-family:'Outfit',sans-serif;
  background:var(--bg-dark);
  color:var(--text-primary);
  min-height:100vh;
  overflow-x:hidden;
  line-height:1.6;
  display:flex;
  align-items:center;
  justify-content:center;
  opacity:0;
  transition:opacity .3s ease;
  padding:20px 0;
}
a { text-decoration:none; color:inherit; }
.background {
  position:fixed; inset:0; z-index:-2;
  background:linear-gradient(135deg,var(--bg-gradient-1) 0%,var(--bg-gradient-2) 50%,var(--bg-gradient-3) 100%);
}
.background::before {
  content:''; position:absolute; inset:0;
  background:
    radial-gradient(ellipse 80% 50% at 20% 40%,rgba(120,0,255,.18) 0%,transparent 50%),
    radial-gradient(ellipse 60% 40% at 80% 60%,rgba(0,200,255,.14) 0%,transparent 50%),
    radial-gradient(ellipse 50% 30% at 50% 80%,rgba(255,0,200,.12) 0%,transparent 50%);
}
.orb { position:fixed; border-radius:50%; filter:blur(80px); opacity:.4; z-index:-1; animation:float 20s ease-in-out infinite; }
.orb-1 { width:500px; height:500px; background:var(--emerald); top:-10%; left:-10%; animation-delay:0s; }
.orb-2 { width:400px; height:400px; background:var(--gold); bottom:-10%; right:-5%; animation-delay:-6s; }
.orb-3 { width:350px; height:350px; background:var(--coral); top:50%; left:40%; animation-delay:-12s; }
@keyframes float {
  0%,100%{transform:translate(0,0) scale(1)}
  25%{transform:translate(30px,-30px) scale(1.05)}
  50%{transform:translate(-20px,20px) scale(.95)}
  75%{transform:translate(20px,10px) scale(1.02)}
}
.grid-overlay {
  position:fixed; inset:0; z-index:-1; opacity:.04;
  background-image:linear-gradient(var(--glass-border) 1px,transparent 1px),linear-gradient(90deg,var(--glass-border) 1px,transparent 1px);
  background-size:60px 60px;
}
[data-theme="light"] .grid-overlay { opacity:.07; }
.theme-toggle-fixed {
  position:fixed; top:20px; right:20px; z-index:200;
  width:44px; height:44px;
  background:var(--glass-bg); backdrop-filter:blur(10px);
  border:1px solid var(--glass-border); border-radius:12px;
  display:flex; align-items:center; justify-content:center;
  cursor:pointer; transition:all var(--transition-fast); color:var(--text-secondary);
}
.theme-toggle-fixed:hover { background:var(--glass-hover); border-color:var(--emerald-light); }
.theme-toggle-fixed svg { width:18px; height:18px; }
.register-wrapper {
  width:100%; max-width:500px; padding:20px;
  animation:fadeInUp .7s ease-out;
}
@keyframes fadeInUp {
  from{opacity:0;transform:translateY(32px)}
  to{opacity:1;transform:translateY(0)}
}
.register-card {
  background:var(--glass-bg);
  backdrop-filter:blur(24px);
  -webkit-backdrop-filter:blur(24px);
  border:1px solid var(--glass-border);
  border-radius:28px;
  padding:44px 40px;
  position:relative;
  overflow:hidden;
  box-shadow:0 32px 80px rgba(0,0,0,.35),0 0 0 1px rgba(255,255,255,.05) inset;
}
.register-card::before {
  content:''; position:absolute; top:0; left:0; right:0; height:1px;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.25),transparent);
}
.register-card::after {
  content:''; position:absolute; top:-120px; right:-120px;
  width:280px; height:280px; border-radius:50%;
  background:radial-gradient(circle,rgba(52,211,153,.06) 0%,transparent 70%);
  pointer-events:none;
}
.logo-wrap {
  display:flex; align-items:center; justify-content:center;
  flex-direction:column; gap:10px; margin-bottom:30px;
}
.logo-icon {
  width:56px; height:56px;
  background:linear-gradient(135deg,var(--emerald),var(--gold));
  border-radius:16px;
  display:flex; align-items:center; justify-content:center;
  font-weight:700; font-size:24px;
  box-shadow:0 12px 40px rgba(5,150,105,.4);
}
.logo-name {
  font-size:22px; font-weight:700;
  background:linear-gradient(135deg,var(--emerald-light),var(--gold));
  -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
}
.logo-tagline { font-size:13px; color:var(--text-muted); margin-top:-4px; }
.divider {
  display:flex; align-items:center; gap:12px; margin-bottom:24px;
}
.divider-line { flex:1; height:1px; background:var(--glass-border); }
.divider-text { font-size:12px; color:var(--text-muted); font-weight:500; white-space:nowrap; }
.form-group { margin-bottom:16px; }
.form-label {
  display:block; font-size:13px; font-weight:600; color:var(--text-secondary);
  margin-bottom:7px; letter-spacing:.3px;
}
.form-input-wrap { position:relative; }
.form-input-icon {
  position:absolute; left:16px; top:50%; transform:translateY(-50%);
  width:18px; height:18px; color:var(--text-muted); pointer-events:none;
  transition:color var(--transition-fast);
}
.form-input {
  width:100%; padding:13px 48px 13px 48px;
  background:var(--glass-bg);
  border:1.5px solid var(--glass-border);
  border-radius:12px;
  color:var(--text-primary);
  font-family:inherit; font-size:14px;
  transition:all var(--transition-fast);
  outline:none;
}
.form-input::placeholder { color:var(--text-muted); }
.form-input:focus {
  border-color:var(--emerald-light);
  background:var(--glass-hover);
  box-shadow:0 0 0 3px rgba(52,211,153,.12),0 0 24px rgba(52,211,153,.15);
}
.form-input.error { border-color:var(--danger); box-shadow:0 0 0 3px rgba(220,38,38,.12); }
.form-input.success { border-color:var(--success); box-shadow:0 0 0 3px rgba(34,197,94,.12); }
.form-input-wrap:focus-within .form-input-icon { color:var(--emerald-light); }
.input-suffix {
  position:absolute; right:14px; top:50%; transform:translateY(-50%);
  display:flex; align-items:center; gap:6px;
}
.username-status {
  font-size:11px; font-weight:700;
  width:18px; height:18px; display:flex; align-items:center; justify-content:center;
}
.username-status.available { color:var(--success); }
.username-status.taken { color:var(--danger); }
.username-status.checking { color:var(--text-muted); }
.password-toggle {
  width:30px; height:30px; border:none; background:transparent;
  cursor:pointer; color:var(--text-muted); display:flex;
  align-items:center; justify-content:center; border-radius:8px;
  transition:all var(--transition-fast);
}
.password-toggle:hover { color:var(--text-primary); background:var(--glass-hover); }
.password-toggle svg { width:16px; height:16px; }
.field-error {
  font-size:12px; color:var(--danger); margin-top:5px;
  display:flex; align-items:center; gap:5px;
  height:0; overflow:hidden; opacity:0; transition:all .2s ease;
}
.field-error.visible { height:auto; opacity:1; margin-top:5px; }
.field-error svg { width:12px; height:12px; flex-shrink:0; }
.field-hint {
  font-size:11px; color:var(--text-muted); margin-top:5px;
}
.strength-wrap { margin-top:8px; }
.strength-bar-track {
  height:4px; background:var(--glass-border); border-radius:2px; overflow:hidden; margin-bottom:5px;
}
.strength-bar-fill {
  height:100%; border-radius:2px; transition:width .3s ease, background .3s ease;
  width:0%;
}
.strength-label { font-size:11px; color:var(--text-muted); font-weight:600; }
.match-hint {
  font-size:11px; margin-top:5px; height:0; overflow:hidden; opacity:0; transition:all .2s;
}
.match-hint.visible { height:auto; opacity:1; }
.match-hint.ok { color:var(--success); }
.match-hint.fail { color:var(--danger); }
.terms-row {
  display:flex; align-items:flex-start; gap:10px; margin-bottom:20px; cursor:pointer;
  font-size:13px; color:var(--text-secondary); user-select:none;
}
.terms-row input { display:none; }
.custom-check {
  width:20px; height:20px; border-radius:6px;
  border:1.5px solid var(--glass-border); background:var(--glass-bg);
  display:flex; align-items:center; justify-content:center;
  transition:all var(--transition-fast); flex-shrink:0; margin-top:1px;
}
.terms-row input:checked + .custom-check {
  background:linear-gradient(135deg,var(--emerald),var(--emerald-light));
  border-color:var(--emerald-light);
  box-shadow:0 0 12px rgba(52,211,153,.3);
}
.terms-row input:checked + .custom-check::after {
  content:''; width:5px; height:9px;
  border:2px solid white; border-top:none; border-left:none;
  transform:rotate(45deg) translateY(-1px);
}
.terms-row a { color:var(--emerald-light); }
.terms-row a:hover { color:var(--gold); }
.register-btn {
  width:100%; padding:14px;
  background:linear-gradient(135deg,var(--emerald),var(--emerald-light));
  border:none; border-radius:14px;
  color:white; font-family:inherit; font-size:15px; font-weight:700;
  cursor:pointer; transition:all var(--transition-fast);
  display:flex; align-items:center; justify-content:center; gap:10px;
  box-shadow:0 8px 32px rgba(5,150,105,.35);
  position:relative; overflow:hidden; letter-spacing:.3px;
}
.register-btn::before {
  content:''; position:absolute; inset:0;
  background:linear-gradient(135deg,transparent,rgba(255,255,255,.1));
  opacity:0; transition:opacity var(--transition-fast);
}
.register-btn:hover::before { opacity:1; }
.register-btn:hover { transform:translateY(-2px); box-shadow:0 14px 40px rgba(5,150,105,.5); }
.register-btn:active { transform:translateY(0); }
.register-btn:disabled { opacity:.65; cursor:not-allowed; transform:none; }
.register-btn svg { width:17px; height:17px; }
.btn-spinner {
  width:18px; height:18px; border:2.5px solid rgba(255,255,255,.35);
  border-top-color:white; border-radius:50%;
  animation:spin 1s linear infinite; flex-shrink:0;
}
@keyframes spin { to{transform:rotate(360deg)} }
.login-alert {
  display:flex; align-items:flex-start; gap:12px; padding:13px 16px;
  border-radius:12px; margin-bottom:18px; font-size:13px;
  opacity:0; transform:translateY(-8px); transition:all .25s ease;
  pointer-events:none;
}
.login-alert.visible { opacity:1; transform:translateY(0); pointer-events:all; }
.login-alert.error { background:rgba(220,38,38,.1); border:1px solid rgba(220,38,38,.25); color:#fca5a5; }
.login-alert.success { background:rgba(34,197,94,.1); border:1px solid rgba(34,197,94,.25); color:#86efac; }
.login-alert svg { width:18px; height:18px; flex-shrink:0; margin-top:1px; }
.card-footer {
  text-align:center; margin-top:24px; padding-top:20px;
  border-top:1px solid var(--glass-border);
  font-size:13px; color:var(--text-muted);
}
.card-footer a { color:var(--emerald-light); font-weight:500; }
.card-footer a:hover { color:var(--gold); }
.security-badge {
  display:flex; align-items:center; justify-content:center; gap:6px;
  margin-top:16px; font-size:11px; color:var(--text-muted);
}
.security-badge svg { width:12px; height:12px; color:var(--emerald-light); }
@keyframes shake {
  0%,100%{transform:translateX(0)}
  20%{transform:translateX(-8px)}
  40%{transform:translateX(8px)}
  60%{transform:translateX(-5px)}
  80%{transform:translateX(5px)}
}
.shake { animation:shake .4s ease; }
@media(max-width:520px) {
  .register-card { padding:32px 22px; border-radius:20px; }
  .register-wrapper { padding:14px; }
}
</style>
</head>
<body>
<div class="background"></div>
<div class="grid-overlay"></div>
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div class="orb orb-3"></div>

<button class="theme-toggle-fixed" id="themeToggle" title="Changer le thème">
  <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
  <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
</button>

<div class="register-wrapper">
  <div class="register-card" id="registerCard">

    <div class="logo-wrap">
      <div class="logo-icon">C</div>
      <div class="logo-name">ComparateurTN</div>
      <div class="logo-tagline">Créer un compte gratuit</div>
    </div>

    <div class="divider">
      <div class="divider-line"></div>
      <span class="divider-text">Inscription sécurisée</span>
      <div class="divider-line"></div>
    </div>

    <div class="login-alert" id="mainAlert">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      <span id="mainAlertText"></span>
    </div>

    <div class="form-group">
      <label class="form-label" for="emailInput">Adresse e-mail</label>
      <div class="form-input-wrap">
        <input class="form-input" id="emailInput" type="email" placeholder="vous@exemple.com" autocomplete="email" spellcheck="false">
        <svg class="form-input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
      </div>
      <div class="field-error" id="emailError"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/></svg><span id="emailErrorText"></span></div>
    </div>

    <div class="form-group">
      <label class="form-label" for="usernameInput">Nom d'utilisateur</label>
      <div class="form-input-wrap">
        <input class="form-input" id="usernameInput" type="text" placeholder="mon_pseudo" autocomplete="username" spellcheck="false" maxlength="20">
        <svg class="form-input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        <div class="input-suffix">
          <span class="username-status" id="usernameStatus"></span>
        </div>
      </div>
      <div class="field-error" id="usernameError"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/></svg><span id="usernameErrorText"></span></div>
      <div class="field-hint">3 à 20 caractères — lettres, chiffres et _ uniquement</div>
    </div>

    <div class="form-group">
      <label class="form-label" for="displayNameInput">Nom d'affichage <span style="color:var(--text-muted);font-weight:400;">(optionnel)</span></label>
      <div class="form-input-wrap">
        <input class="form-input" id="displayNameInput" type="text" placeholder="Votre Prénom" autocomplete="name" maxlength="50">
        <svg class="form-input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
      </div>
      <div class="field-error" id="displayNameError"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/></svg><span id="displayNameErrorText"></span></div>
    </div>

    <div class="form-group">
      <label class="form-label" for="passwordInput">Mot de passe</label>
      <div class="form-input-wrap">
        <input class="form-input" id="passwordInput" type="password" placeholder="••••••••••••" autocomplete="new-password">
        <svg class="form-input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        <div class="input-suffix">
          <button class="password-toggle" id="pwToggle1" type="button">
            <svg id="eyeIcon1" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
      </div>
      <div class="strength-wrap" id="strengthWrap" style="display:none;">
        <div class="strength-bar-track"><div class="strength-bar-fill" id="strengthBar"></div></div>
        <span class="strength-label" id="strengthLabel"></span>
      </div>
      <div class="field-error" id="passwordError"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/></svg><span id="passwordErrorText"></span></div>
    </div>

    <div class="form-group">
      <label class="form-label" for="confirmPasswordInput">Confirmer le mot de passe</label>
      <div class="form-input-wrap">
        <input class="form-input" id="confirmPasswordInput" type="password" placeholder="••••••••••••" autocomplete="new-password">
        <svg class="form-input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        <div class="input-suffix">
          <button class="password-toggle" id="pwToggle2" type="button">
            <svg id="eyeIcon2" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
      </div>
      <div class="match-hint" id="matchHint"></div>
      <div class="field-error" id="confirmPasswordError"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/></svg><span id="confirmPasswordErrorText"></span></div>
    </div>

    <label class="terms-row">
      <input type="checkbox" id="termsCheck">
      <span class="custom-check"></span>
      <span>J'accepte les <a href="#">conditions d'utilisation</a> et la <a href="#">politique de confidentialité</a></span>
    </label>

    <button class="register-btn" id="registerBtn" type="button" onclick="handleRegister()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="8.5" cy="7" r="4"/><line x1="20" y1="8" x2="20" y2="14"/><line x1="23" y1="11" x2="17" y2="11"/></svg>
      Créer mon compte
    </button>

    <div class="security-badge">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
      Compte sécurisé — Données chiffrées
    </div>

    <div class="card-footer">
      Déjà un compte ? <a href="/login">Se connecter</a>
    </div>

  </div>
</div>

<script>
(function(){
'use strict';

function initTheme(){
  const toggle = document.getElementById('themeToggle');
  const sun = toggle.querySelector('.icon-sun');
  const moon = toggle.querySelector('.icon-moon');
  function setTheme(t){
    document.documentElement.setAttribute('data-theme', t);
    localStorage.setItem('theme', t);
    sun.style.display = t === 'light' ? 'none' : 'block';
    moon.style.display = t === 'light' ? 'block' : 'none';
  }
  setTheme(localStorage.getItem('theme') || 'dark');
  toggle.addEventListener('click', () => setTheme(document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark'));
}

function showAlert(msg, type = 'error'){
  const el = document.getElementById('mainAlert');
  const text = document.getElementById('mainAlertText');
  el.className = 'login-alert ' + type + ' visible';
  el.querySelector('svg').innerHTML = type === 'error'
    ? '<circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>'
    : '<polyline points="20 6 9 17 4 12"/>';
  text.textContent = msg;
}

function hideAlert(){
  document.getElementById('mainAlert').classList.remove('visible');
}

function showFieldError(inputId, errId, msg){
  const input = document.getElementById(inputId);
  const errEl = document.getElementById(errId + 'Error');
  const errText = document.getElementById(errId + 'ErrorText');
  if(input) input.classList.add('error');
  if(errEl) errEl.classList.add('visible');
  if(errText) errText.textContent = msg;
}

function clearFieldError(inputId, errId){
  const input = document.getElementById(inputId);
  const errEl = document.getElementById(errId + 'Error');
  if(input){ input.classList.remove('error'); input.classList.remove('success'); }
  if(errEl) errEl.classList.remove('visible');
}

function setLoading(on){
  const btn = document.getElementById('registerBtn');
  btn.disabled = on;
  btn.innerHTML = on
    ? '<div class="btn-spinner"></div>Création en cours…'
    : '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="8.5" cy="7" r="4"/><line x1="20" y1="8" x2="20" y2="14"/><line x1="23" y1="11" x2="17" y2="11"/></svg>Créer mon compte';
}

function shakeCard(){
  const card = document.getElementById('registerCard');
  card.classList.remove('shake');
  void card.offsetWidth;
  card.classList.add('shake');
  card.addEventListener('animationend', () => card.classList.remove('shake'), { once: true });
}

function togglePw(inputId, eyeId){
  const input = document.getElementById(inputId);
  const icon = document.getElementById(eyeId);
  const isPass = input.type === 'password';
  input.type = isPass ? 'text' : 'password';
  icon.innerHTML = isPass
    ? '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>'
    : '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
}

function getPasswordStrength(pw){
  if(!pw) return { score: 0, label: '', color: '' };
  let score = 0;
  if(pw.length >= 8) score++;
  if(pw.length >= 12) score++;
  if(/[A-Z]/.test(pw)) score++;
  if(/[a-z]/.test(pw)) score++;
  if(/[0-9]/.test(pw)) score++;
  if(/[^A-Za-z0-9]/.test(pw)) score++;
  if(score <= 2) return { score, width: 25, label: 'Faible', color: '#dc2626' };
  if(score <= 3) return { score, width: 50, label: 'Correct', color: '#d97706' };
  if(score <= 4) return { score, width: 75, label: 'Fort', color: '#2563eb' };
  return { score, width: 100, label: 'Très fort', color: '#16a34a' };
}

function updateStrength(pw){
  const wrap = document.getElementById('strengthWrap');
  const bar = document.getElementById('strengthBar');
  const label = document.getElementById('strengthLabel');
  if(!pw){ wrap.style.display = 'none'; return; }
  wrap.style.display = 'block';
  const s = getPasswordStrength(pw);
  bar.style.width = s.width + '%';
  bar.style.background = s.color;
  label.textContent = s.label;
  label.style.color = s.color;
}

function checkMatch(){
  const pw = document.getElementById('passwordInput').value;
  const cpw = document.getElementById('confirmPasswordInput').value;
  const hint = document.getElementById('matchHint');
  if(!cpw){ hint.className = 'match-hint'; return; }
  if(pw === cpw){
    hint.className = 'match-hint visible ok';
    hint.textContent = '✓ Les mots de passe correspondent';
    document.getElementById('confirmPasswordInput').classList.add('success');
    document.getElementById('confirmPasswordInput').classList.remove('error');
  } else {
    hint.className = 'match-hint visible fail';
    hint.textContent = '✗ Les mots de passe ne correspondent pas';
    document.getElementById('confirmPasswordInput').classList.add('error');
    document.getElementById('confirmPasswordInput').classList.remove('success');
  }
}

let usernameTimer = null;
function checkUsername(val){
  const status = document.getElementById('usernameStatus');
  clearTimeout(usernameTimer);
  if(!val || val.length < 3){ status.textContent = ''; return; }
  if(!/^[a-zA-Z0-9_]+$/.test(val)){ status.textContent = ''; return; }
  status.className = 'username-status checking';
  status.textContent = '…';
  usernameTimer = setTimeout(async () => {
    try {
      const res = await fetch('/auth/check-username/' + encodeURIComponent(val));
      const data = await res.json();
      if(data.available){
        status.className = 'username-status available';
        status.textContent = '✓';
        document.getElementById('usernameInput').classList.add('success');
        document.getElementById('usernameInput').classList.remove('error');
      } else {
        status.className = 'username-status taken';
        status.textContent = '✗';
        showFieldError('usernameInput', 'username', 'Ce nom d\'utilisateur est déjà pris');
      }
    } catch(e){
      status.textContent = '';
    }
  }, 500);
}

function initEvents(){
  document.getElementById('pwToggle1').addEventListener('click', () => togglePw('passwordInput', 'eyeIcon1'));
  document.getElementById('pwToggle2').addEventListener('click', () => togglePw('confirmPasswordInput', 'eyeIcon2'));
  document.getElementById('passwordInput').addEventListener('input', e => {
    updateStrength(e.target.value);
    clearFieldError('passwordInput', 'password');
    hideAlert();
    checkMatch();
  });
  document.getElementById('confirmPasswordInput').addEventListener('input', () => {
    clearFieldError('confirmPasswordInput', 'confirmPassword');
    checkMatch();
  });
  document.getElementById('usernameInput').addEventListener('input', e => {
    clearFieldError('usernameInput', 'username');
    document.getElementById('usernameStatus').textContent = '';
    hideAlert();
    checkUsername(e.target.value.trim());
  });
  ['emailInput','displayNameInput'].forEach(id => {
    document.getElementById(id).addEventListener('input', () => { clearFieldError(id, id.replace('Input','')); hideAlert(); });
  });
  document.addEventListener('keydown', e => { if(e.key === 'Enter') handleRegister(); });
}

window.handleRegister = async function(){
  hideAlert();
  const email = document.getElementById('emailInput').value.trim();
  const username = document.getElementById('usernameInput').value.trim();
  const displayName = document.getElementById('displayNameInput').value.trim();
  const password = document.getElementById('passwordInput').value;
  const confirmPassword = document.getElementById('confirmPasswordInput').value;
  const terms = document.getElementById('termsCheck').checked;

  ['email','username','displayName','password','confirmPassword'].forEach(f => clearFieldError(f+'Input', f));

  let valid = true;

  if(!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)){
    showFieldError('emailInput', 'email', 'Adresse e-mail invalide'); valid = false;
  }
  if(!username || username.length < 3){
    showFieldError('usernameInput', 'username', 'Nom d\'utilisateur trop court (min 3 caractères)'); valid = false;
  } else if(!/^[a-zA-Z0-9_]+$/.test(username)){
    showFieldError('usernameInput', 'username', 'Caractères invalides (lettres, chiffres, _ uniquement)'); valid = false;
  }
  if(!password || password.length < 8){
    showFieldError('passwordInput', 'password', 'Le mot de passe doit contenir au moins 8 caractères'); valid = false;
  } else if(!/(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[^A-Za-z0-9])/.test(password)){
    showFieldError('passwordInput', 'password', 'Doit contenir une majuscule, une minuscule, un chiffre et un caractère spécial'); valid = false;
  }
  if(password !== confirmPassword){
    showFieldError('confirmPasswordInput', 'confirmPassword', 'Les mots de passe ne correspondent pas'); valid = false;
  }
  if(!terms){
    showAlert('Vous devez accepter les conditions d\'utilisation'); valid = false;
  }
  if(!valid){ shakeCard(); return; }

  setLoading(true);
  try {
    const res = await fetch('/auth/register', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, username, displayName, password, confirmPassword, terms: 'true' })
    });
    const data = await res.json();
    if(res.ok && data.success){
      showAlert('Compte créé ! Vérifiez votre boîte e-mail pour activer votre compte.', 'success');
      setTimeout(() => {
        document.body.style.opacity = '0';
        document.body.style.transition = 'opacity .3s ease';
        setTimeout(() => { window.location.href = '/verify-email?email=' + encodeURIComponent(email); }, 300);
      }, 2000);
    } else {
      setLoading(false);
      shakeCard();
      showAlert(data.error || 'Erreur lors de la création du compte.');
    }
  } catch(e){
    setLoading(false);
    shakeCard();
    showAlert('Erreur de connexion. Vérifiez votre réseau.');
  }
};

function init(){
  initTheme();
  initEvents();
  window.addEventListener('load', () => { document.body.style.opacity = '1'; });
}

if(document.readyState === 'loading') document.addEventListener('DOMContentLoaded', init);
else init();
})();
</script>
</body>
</html>
