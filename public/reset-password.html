<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nouveau mot de passe — ComparateurTN</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --emerald:#059669; --emerald-light:#34d399; --gold:#d4a574; --coral:#e07a5f;
  --glass-bg:rgba(255,255,255,0.05); --glass-border:rgba(255,255,255,0.1);
  --glass-hover:rgba(255,255,255,0.08);
  --bg-dark:#0a0f0d; --bg-gradient-1:#0d1a14; --bg-gradient-2:#132419; --bg-gradient-3:#1a2e23;
  --text-primary:#f5f5f4; --text-secondary:rgba(245,245,244,0.7); --text-muted:rgba(245,245,244,0.4);
  --danger:#dc2626; --transition-fast:0.2s ease;
}
[data-theme="light"] {
  --glass-bg:rgba(255,255,255,0.6); --glass-border:rgba(0,0,0,0.1); --glass-hover:rgba(255,255,255,0.8);
  --bg-dark:#f5f5f0; --bg-gradient-1:#e8f5e9; --bg-gradient-2:#f1f8e9; --bg-gradient-3:#fefefe;
  --text-primary:#1a1a1a; --text-secondary:rgba(26,26,26,0.7); --text-muted:rgba(26,26,26,0.5);
}
[data-theme="light"] .orb { opacity:.15; }
*,*::before,*::after { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family:'Outfit',sans-serif; background:var(--bg-dark); color:var(--text-primary);
  min-height:100vh; display:flex; align-items:center; justify-content:center;
  opacity:0; transition:opacity .3s ease; padding:20px;
}
a { text-decoration:none; color:inherit; }
.background {
  position:fixed; inset:0; z-index:-2;
  background:linear-gradient(135deg,var(--bg-gradient-1) 0%,var(--bg-gradient-2) 50%,var(--bg-gradient-3) 100%);
}
.background::before {
  content:''; position:absolute; inset:0;
  background:radial-gradient(ellipse 80% 50% at 20% 40%,rgba(120,0,255,.18) 0%,transparent 50%),
    radial-gradient(ellipse 60% 40% at 80% 60%,rgba(0,200,255,.14) 0%,transparent 50%);
}
.orb { position:fixed; border-radius:50%; filter:blur(80px); opacity:.4; z-index:-1; animation:float 20s ease-in-out infinite; }
.orb-1 { width:500px; height:500px; background:var(--emerald); top:-10%; left:-10%; }
.orb-2 { width:400px; height:400px; background:var(--gold); bottom:-10%; right:-5%; animation-delay:-6s; }
@keyframes float { 0%,100%{transform:translate(0,0)} 50%{transform:translate(-20px,20px)} }
.theme-toggle-fixed {
  position:fixed; top:20px; right:20px; z-index:200;
  width:44px; height:44px; background:var(--glass-bg); backdrop-filter:blur(10px);
  border:1px solid var(--glass-border); border-radius:12px;
  display:flex; align-items:center; justify-content:center;
  cursor:pointer; transition:all var(--transition-fast); color:var(--text-secondary);
}
.theme-toggle-fixed:hover { background:var(--glass-hover); border-color:var(--emerald-light); }
.theme-toggle-fixed svg { width:18px; height:18px; }
.wrapper { width:100%; max-width:440px; animation:fadeInUp .7s ease-out; }
@keyframes fadeInUp { from{opacity:0;transform:translateY(32px)} to{opacity:1;transform:translateY(0)} }
.card {
  background:var(--glass-bg); backdrop-filter:blur(24px); -webkit-backdrop-filter:blur(24px);
  border:1px solid var(--glass-border); border-radius:28px; padding:48px 44px;
  position:relative; overflow:hidden;
  box-shadow:0 32px 80px rgba(0,0,0,.35),0 0 0 1px rgba(255,255,255,.05) inset;
}
.card::before {
  content:''; position:absolute; top:0; left:0; right:0; height:1px;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.25),transparent);
}
.logo-wrap { text-align:center; margin-bottom:32px; }
.logo-icon {
  width:64px; height:64px; background:linear-gradient(135deg,var(--emerald),var(--gold));
  border-radius:20px; display:flex; align-items:center; justify-content:center;
  font-weight:700; font-size:28px; box-shadow:0 12px 40px rgba(5,150,105,.4);
  margin:0 auto 14px;
}
.logo-name {
  font-size:22px; font-weight:700;
  background:linear-gradient(135deg,var(--emerald-light),var(--gold));
  -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
}
.logo-tagline { font-size:13px; color:var(--text-muted); margin-top:4px; }
.alert {
  display:flex; align-items:flex-start; gap:12px; padding:13px 16px;
  border-radius:12px; margin-bottom:20px; font-size:13px;
  opacity:0; transform:translateY(-8px); transition:all .25s ease; pointer-events:none;
}
.alert.visible { opacity:1; transform:translateY(0); pointer-events:all; }
.alert.error { background:rgba(220,38,38,.1); border:1px solid rgba(220,38,38,.25); color:#fca5a5; }
.alert.success { background:rgba(34,197,94,.1); border:1px solid rgba(34,197,94,.25); color:#86efac; }
.alert svg { width:18px; height:18px; flex-shrink:0; margin-top:1px; }
.form-group { margin-bottom:18px; }
.form-label { display:block; font-size:13px; font-weight:600; color:var(--text-secondary); margin-bottom:8px; }
.form-input-wrap { position:relative; }
.form-input-icon {
  position:absolute; left:16px; top:50%; transform:translateY(-50%);
  width:18px; height:18px; color:var(--text-muted); pointer-events:none;
}
.form-input-wrap:focus-within .form-input-icon { color:var(--emerald-light); }
.form-input {
  width:100%; padding:14px 48px 14px 48px;
  background:var(--glass-bg); border:1.5px solid var(--glass-border); border-radius:14px;
  color:var(--text-primary); font-family:inherit; font-size:15px;
  transition:all var(--transition-fast); outline:none;
}
.form-input::placeholder { color:var(--text-muted); }
.form-input:focus { border-color:var(--emerald-light); background:var(--glass-hover); box-shadow:0 0 0 3px rgba(52,211,153,.12); }
.form-input.error { border-color:var(--danger); box-shadow:0 0 0 3px rgba(220,38,38,.12); }
.pw-toggle {
  position:absolute; right:14px; top:50%; transform:translateY(-50%);
  width:30px; height:30px; border:none; background:transparent;
  cursor:pointer; color:var(--text-muted); display:flex; align-items:center; justify-content:center;
  border-radius:8px; transition:all var(--transition-fast);
}
.pw-toggle:hover { color:var(--text-primary); background:var(--glass-hover); }
.pw-toggle svg { width:16px; height:16px; }
.field-error { font-size:12px; color:var(--danger); margin-top:5px; display:none; }
.field-error.visible { display:block; }
.strength-wrap { margin-top:8px; display:none; }
.strength-bar-track { height:4px; background:var(--glass-border); border-radius:2px; overflow:hidden; margin-bottom:4px; }
.strength-bar-fill { height:100%; border-radius:2px; transition:width .3s ease, background .3s ease; width:0%; }
.strength-label { font-size:11px; color:var(--text-muted); font-weight:600; }
.match-hint { font-size:11px; margin-top:5px; display:none; }
.match-hint.visible { display:block; }
.match-hint.ok { color:#22c55e; }
.match-hint.fail { color:var(--danger); }
.submit-btn {
  width:100%; padding:14px;
  background:linear-gradient(135deg,var(--emerald),var(--emerald-light));
  border:none; border-radius:14px; color:white; font-family:inherit; font-size:15px; font-weight:700;
  cursor:pointer; transition:all var(--transition-fast);
  display:flex; align-items:center; justify-content:center; gap:10px;
  box-shadow:0 8px 32px rgba(5,150,105,.35); letter-spacing:.3px; margin-bottom:16px;
}
.submit-btn:hover { transform:translateY(-2px); box-shadow:0 14px 40px rgba(5,150,105,.5); }
.submit-btn:disabled { opacity:.65; cursor:not-allowed; transform:none; }
.btn-spinner {
  width:18px; height:18px; border:2.5px solid rgba(255,255,255,.35);
  border-top-color:white; border-radius:50%; animation:spin 1s linear infinite;
}
@keyframes spin { to{transform:rotate(360deg)} }
.back-link { text-align:center; font-size:13px; color:var(--text-muted); }
.back-link a { color:var(--emerald-light); font-weight:500; }
.back-link a:hover { color:var(--gold); }
@media(max-width:480px){ .card { padding:36px 24px; border-radius:20px; } }
</style>
</head>
<body>
<div class="background"></div>
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>

<button class="theme-toggle-fixed" id="themeToggle">
  <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
  <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
</button>

<div class="wrapper">
  <div class="card">
    <div class="logo-wrap">
      <div class="logo-icon">C</div>
      <div class="logo-name">ComparateurTN</div>
      <div class="logo-tagline">Créer un nouveau mot de passe</div>
    </div>

    <div class="alert" id="mainAlert">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      <span id="mainAlertText"></span>
    </div>

    <div id="formSection">
      <div class="form-group">
        <label class="form-label" for="passwordInput">Nouveau mot de passe</label>
        <div class="form-input-wrap">
          <input class="form-input" id="passwordInput" type="password" placeholder="••••••••••••" autocomplete="new-password">
          <svg class="form-input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          <button class="pw-toggle" id="pwToggle1" type="button">
            <svg id="eye1" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
        <div class="strength-wrap" id="strengthWrap">
          <div class="strength-bar-track"><div class="strength-bar-fill" id="strengthBar"></div></div>
          <span class="strength-label" id="strengthLabel"></span>
        </div>
        <div class="field-error" id="passwordError"></div>
      </div>

      <div class="form-group">
        <label class="form-label" for="confirmInput">Confirmer le mot de passe</label>
        <div class="form-input-wrap">
          <input class="form-input" id="confirmInput" type="password" placeholder="••••••••••••" autocomplete="new-password">
          <svg class="form-input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          <button class="pw-toggle" id="pwToggle2" type="button">
            <svg id="eye2" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
        <div class="match-hint" id="matchHint"></div>
        <div class="field-error" id="confirmError"></div>
      </div>

      <button class="submit-btn" id="submitBtn" onclick="handleSubmit()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        Réinitialiser le mot de passe
      </button>

      <div class="back-link"><a href="/login">← Retour à la connexion</a></div>
    </div>

  </div>
</div>

<script>
(function(){
'use strict';
function initTheme(){
  const toggle = document.getElementById('themeToggle');
  const sun = toggle.querySelector('.icon-sun');
  const moon = toggle.querySelector('.icon-moon');
  function setTheme(t){
    document.documentElement.setAttribute('data-theme', t);
    localStorage.setItem('theme', t);
    sun.style.display = t === 'light' ? 'none' : 'block';
    moon.style.display = t === 'light' ? 'block' : 'none';
  }
  setTheme(localStorage.getItem('theme') || 'dark');
  toggle.addEventListener('click', () => setTheme(document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark'));
}

const token = new URLSearchParams(window.location.search).get('token');

function showAlert(msg, type){
  const el = document.getElementById('mainAlert');
  el.className = 'alert ' + type + ' visible';
  el.querySelector('svg').innerHTML = type === 'success'
    ? '<polyline points="20 6 9 17 4 12"/>'
    : '<circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>';
  document.getElementById('mainAlertText').textContent = msg;
}

function togglePw(inputId, eyeId){
  const input = document.getElementById(inputId);
  const icon = document.getElementById(eyeId);
  const isPass = input.type === 'password';
  input.type = isPass ? 'text' : 'password';
  icon.innerHTML = isPass
    ? '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>'
    : '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
}

function getStrength(pw){
  let score = 0;
  if(pw.length >= 8) score++;
  if(pw.length >= 12) score++;
  if(/[A-Z]/.test(pw)) score++;
  if(/[a-z]/.test(pw)) score++;
  if(/[0-9]/.test(pw)) score++;
  if(/[^A-Za-z0-9]/.test(pw)) score++;
  if(score <= 2) return { width:25, label:'Faible', color:'#dc2626' };
  if(score <= 3) return { width:50, label:'Correct', color:'#d97706' };
  if(score <= 4) return { width:75, label:'Fort', color:'#2563eb' };
  return { width:100, label:'Très fort', color:'#16a34a' };
}

document.getElementById('pwToggle1').addEventListener('click', () => togglePw('passwordInput', 'eye1'));
document.getElementById('pwToggle2').addEventListener('click', () => togglePw('confirmInput', 'eye2'));

document.getElementById('passwordInput').addEventListener('input', e => {
  const pw = e.target.value;
  const wrap = document.getElementById('strengthWrap');
  const bar = document.getElementById('strengthBar');
  const label = document.getElementById('strengthLabel');
  if(pw){ wrap.style.display = 'block'; const s = getStrength(pw); bar.style.width = s.width + '%'; bar.style.background = s.color; label.textContent = s.label; label.style.color = s.color; }
  else { wrap.style.display = 'none'; }
  document.getElementById('passwordError').classList.remove('visible');
  checkMatch();
});

document.getElementById('confirmInput').addEventListener('input', () => {
  document.getElementById('confirmError').classList.remove('visible');
  checkMatch();
});

function checkMatch(){
  const pw = document.getElementById('passwordInput').value;
  const cpw = document.getElementById('confirmInput').value;
  const hint = document.getElementById('matchHint');
  if(!cpw){ hint.className = 'match-hint'; return; }
  if(pw === cpw){ hint.className = 'match-hint visible ok'; hint.textContent = '✓ Les mots de passe correspondent'; }
  else { hint.className = 'match-hint visible fail'; hint.textContent = '✗ Les mots de passe ne correspondent pas'; }
}

window.handleSubmit = async function(){
  if(!token){
    showAlert('Token manquant. Veuillez utiliser le lien envoyé par e-mail.', 'error');
    return;
  }
  const pw = document.getElementById('passwordInput').value;
  const cpw = document.getElementById('confirmInput').value;
  const pwErr = document.getElementById('passwordError');
  const cErr = document.getElementById('confirmError');
  let valid = true;

  if(!pw || pw.length < 8){ pwErr.textContent = 'Le mot de passe doit contenir au moins 8 caractères'; pwErr.className = 'field-error visible'; valid = false; }
  else if(!/(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[^A-Za-z0-9])/.test(pw)){ pwErr.textContent = 'Doit contenir une majuscule, une minuscule, un chiffre et un caractère spécial'; pwErr.className = 'field-error visible'; valid = false; }
  if(pw !== cpw){ cErr.textContent = 'Les mots de passe ne correspondent pas'; cErr.className = 'field-error visible'; valid = false; }
  if(!valid) return;

  const btn = document.getElementById('submitBtn');
  btn.disabled = true;
  btn.innerHTML = '<div class="btn-spinner"></div>Réinitialisation…';

  try {
    const res = await fetch('/auth/reset-password/' + encodeURIComponent(token), {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ password: pw, confirmPassword: cpw })
    });
    const data = await res.json();
    if(res.ok && data.success){
      document.getElementById('formSection').style.display = 'none';
      showAlert('Mot de passe réinitialisé avec succès ! Vous allez être redirigé…', 'success');
      setTimeout(() => { window.location.href = '/login'; }, 2500);
    } else {
      btn.disabled = false;
      btn.innerHTML = 'Réinitialiser le mot de passe';
      showAlert(data.error || 'Erreur lors de la réinitialisation.', 'error');
    }
  } catch(e){
    btn.disabled = false;
    btn.innerHTML = 'Réinitialiser le mot de passe';
    showAlert('Erreur de connexion. Réessayez.', 'error');
  }
};

if(!token) showAlert('Lien invalide. Veuillez utiliser le lien envoyé par e-mail.', 'error');
initTheme();
window.addEventListener('load', () => { document.body.style.opacity = '1'; });
})();
</script>
</body>
</html>
