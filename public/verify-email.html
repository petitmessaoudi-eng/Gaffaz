<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vérification e-mail — ComparateurTN</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --emerald:#059669; --emerald-light:#34d399; --gold:#d4a574; --coral:#e07a5f;
  --glass-bg:rgba(255,255,255,0.05); --glass-border:rgba(255,255,255,0.1);
  --glass-hover:rgba(255,255,255,0.08);
  --bg-dark:#0a0f0d; --bg-gradient-1:#0d1a14; --bg-gradient-2:#132419; --bg-gradient-3:#1a2e23;
  --text-primary:#f5f5f4; --text-secondary:rgba(245,245,244,0.7); --text-muted:rgba(245,245,244,0.4);
  --danger:#dc2626; --success:#22c55e;
  --transition-fast:0.2s ease;
}
[data-theme="light"] {
  --glass-bg:rgba(255,255,255,0.6); --glass-border:rgba(0,0,0,0.1); --glass-hover:rgba(255,255,255,0.8);
  --bg-dark:#f5f5f0; --bg-gradient-1:#e8f5e9; --bg-gradient-2:#f1f8e9; --bg-gradient-3:#fefefe;
  --text-primary:#1a1a1a; --text-secondary:rgba(26,26,26,0.7); --text-muted:rgba(26,26,26,0.5);
}
[data-theme="light"] .orb { opacity:.15; }
*,*::before,*::after { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family:'Outfit',sans-serif; background:var(--bg-dark); color:var(--text-primary);
  min-height:100vh; display:flex; align-items:center; justify-content:center;
  opacity:0; transition:opacity .3s ease; padding:20px;
}
a { text-decoration:none; color:inherit; }
.background {
  position:fixed; inset:0; z-index:-2;
  background:linear-gradient(135deg,var(--bg-gradient-1) 0%,var(--bg-gradient-2) 50%,var(--bg-gradient-3) 100%);
}
.background::before {
  content:''; position:absolute; inset:0;
  background:
    radial-gradient(ellipse 80% 50% at 20% 40%,rgba(120,0,255,.18) 0%,transparent 50%),
    radial-gradient(ellipse 60% 40% at 80% 60%,rgba(0,200,255,.14) 0%,transparent 50%);
}
.orb { position:fixed; border-radius:50%; filter:blur(80px); opacity:.4; z-index:-1; animation:float 20s ease-in-out infinite; }
.orb-1 { width:500px; height:500px; background:var(--emerald); top:-10%; left:-10%; }
.orb-2 { width:400px; height:400px; background:var(--gold); bottom:-10%; right:-5%; animation-delay:-6s; }
@keyframes float {
  0%,100%{transform:translate(0,0) scale(1)}
  50%{transform:translate(-20px,20px) scale(.95)}
}
.theme-toggle-fixed {
  position:fixed; top:20px; right:20px; z-index:200;
  width:44px; height:44px; background:var(--glass-bg); backdrop-filter:blur(10px);
  border:1px solid var(--glass-border); border-radius:12px;
  display:flex; align-items:center; justify-content:center;
  cursor:pointer; transition:all var(--transition-fast); color:var(--text-secondary);
}
.theme-toggle-fixed:hover { background:var(--glass-hover); border-color:var(--emerald-light); }
.theme-toggle-fixed svg { width:18px; height:18px; }
.card {
  background:var(--glass-bg); backdrop-filter:blur(24px); -webkit-backdrop-filter:blur(24px);
  border:1px solid var(--glass-border); border-radius:28px; padding:52px 44px;
  max-width:460px; width:100%; text-align:center; position:relative; overflow:hidden;
  box-shadow:0 32px 80px rgba(0,0,0,.35);
  animation:fadeInUp .7s ease-out;
}
.card::before {
  content:''; position:absolute; top:0; left:0; right:0; height:1px;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.25),transparent);
}
@keyframes fadeInUp {
  from{opacity:0;transform:translateY(32px)}
  to{opacity:1;transform:translateY(0)}
}
.icon-wrap {
  width:80px; height:80px; border-radius:50%; margin:0 auto 24px;
  display:flex; align-items:center; justify-content:center;
  font-size:36px;
}
.icon-wrap.success { background:rgba(34,197,94,.15); border:2px solid rgba(34,197,94,.3); }
.icon-wrap.error { background:rgba(220,38,38,.15); border:2px solid rgba(220,38,38,.3); }
.icon-wrap.pending { background:rgba(52,211,153,.1); border:2px solid rgba(52,211,153,.2); }
.title { font-size:24px; font-weight:700; margin-bottom:12px; }
.desc { font-size:14px; color:var(--text-secondary); line-height:1.7; margin-bottom:28px; }
.btn {
  display:inline-flex; align-items:center; gap:10px;
  padding:13px 28px; border-radius:14px; border:none;
  font-family:inherit; font-size:14px; font-weight:700; cursor:pointer;
  transition:all var(--transition-fast); text-decoration:none;
}
.btn-primary {
  background:linear-gradient(135deg,var(--emerald),var(--emerald-light));
  color:white; box-shadow:0 8px 32px rgba(5,150,105,.35);
}
.btn-primary:hover { transform:translateY(-2px); box-shadow:0 14px 40px rgba(5,150,105,.5); }
.btn-ghost {
  background:var(--glass-bg); border:1px solid var(--glass-border); color:var(--text-secondary);
}
.btn-ghost:hover { background:var(--glass-hover); color:var(--text-primary); }
.btn-group { display:flex; flex-direction:column; gap:10px; align-items:center; }
.resend-form { margin-top:24px; padding-top:24px; border-top:1px solid var(--glass-border); }
.resend-form p { font-size:13px; color:var(--text-muted); margin-bottom:14px; }
.form-input {
  width:100%; padding:12px 16px; background:var(--glass-bg);
  border:1.5px solid var(--glass-border); border-radius:12px;
  color:var(--text-primary); font-family:inherit; font-size:14px;
  margin-bottom:12px; outline:none; transition:all var(--transition-fast);
}
.form-input:focus { border-color:var(--emerald-light); box-shadow:0 0 0 3px rgba(52,211,153,.12); }
.alert {
  padding:12px 16px; border-radius:10px; font-size:13px; margin-bottom:16px;
  opacity:0; transition:opacity .3s;
}
.alert.visible { opacity:1; }
.alert.success { background:rgba(34,197,94,.1); border:1px solid rgba(34,197,94,.25); color:#86efac; }
.alert.error { background:rgba(220,38,38,.1); border:1px solid rgba(220,38,38,.25); color:#fca5a5; }
.btn-spinner {
  width:16px; height:16px; border:2px solid rgba(255,255,255,.35);
  border-top-color:white; border-radius:50%; animation:spin 1s linear infinite;
}
@keyframes spin { to{transform:rotate(360deg)} }
</style>
</head>
<body>
<div class="background"></div>
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>

<button class="theme-toggle-fixed" id="themeToggle">
  <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
  <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
</button>

<div class="card" id="mainCard"></div>

<script>
(function(){
'use strict';

function initTheme(){
  const toggle = document.getElementById('themeToggle');
  const sun = toggle.querySelector('.icon-sun');
  const moon = toggle.querySelector('.icon-moon');
  function setTheme(t){
    document.documentElement.setAttribute('data-theme', t);
    localStorage.setItem('theme', t);
    sun.style.display = t === 'light' ? 'none' : 'block';
    moon.style.display = t === 'light' ? 'block' : 'none';
  }
  setTheme(localStorage.getItem('theme') || 'dark');
  toggle.addEventListener('click', () => setTheme(document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark'));
}

const params = new URLSearchParams(window.location.search);
const status = params.get('status');
const email = params.get('email') || '';
const card = document.getElementById('mainCard');

function renderSuccess(){
  card.innerHTML = `
    <div class="icon-wrap success">✓</div>
    <div class="title">E-mail vérifié !</div>
    <div class="desc">Votre adresse e-mail a été vérifiée avec succès. Votre compte est maintenant actif.</div>
    <div class="btn-group">
      <a href="/login" class="btn btn-primary">Se connecter</a>
      <a href="/products" class="btn btn-ghost">Retour au comparateur</a>
    </div>`;
}

function renderInvalid(){
  card.innerHTML = `
    <div class="icon-wrap error">✗</div>
    <div class="title">Lien invalide ou expiré</div>
    <div class="desc">Ce lien de vérification est invalide ou a expiré. Vous pouvez demander un nouveau lien ci-dessous.</div>
    <div class="resend-form">
      <p>Entrez votre adresse e-mail pour recevoir un nouveau lien :</p>
      <div class="alert" id="resendAlert"></div>
      <input class="form-input" id="resendEmail" type="email" placeholder="vous@exemple.com" value="${email}">
      <button class="btn btn-primary" id="resendBtn" onclick="resend()" style="width:100%;justify-content:center;">
        Renvoyer le lien
      </button>
    </div>
    <br>
    <a href="/products" class="btn btn-ghost" style="width:100%;justify-content:center;margin-top:8px;">Retour au comparateur</a>`;
}

function renderPending(){
  card.innerHTML = `
    <div class="icon-wrap pending">📧</div>
    <div class="title">Vérifiez votre e-mail</div>
    <div class="desc">Un e-mail de vérification a été envoyé à <strong>${email || 'votre adresse'}</strong>. Cliquez sur le lien dans l'e-mail pour activer votre compte.</div>
    <div class="btn-group">
      <a href="/login" class="btn btn-ghost">Déjà vérifié ? Se connecter</a>
    </div>
    <div class="resend-form">
      <p>Vous n'avez pas reçu l'e-mail ?</p>
      <div class="alert" id="resendAlert"></div>
      <input class="form-input" id="resendEmail" type="email" placeholder="vous@exemple.com" value="${email}">
      <button class="btn btn-primary" id="resendBtn" onclick="resend()" style="width:100%;justify-content:center;">
        Renvoyer l'e-mail
      </button>
    </div>`;
}

if(status === 'success') renderSuccess();
else if(status === 'invalid' || status === 'error') renderInvalid();
else renderPending();

window.resend = async function(){
  const emailEl = document.getElementById('resendEmail');
  const btn = document.getElementById('resendBtn');
  const alertEl = document.getElementById('resendAlert');
  const val = emailEl?.value?.trim();
  if(!val || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(val)){
    alertEl.className = 'alert error visible';
    alertEl.textContent = 'Adresse e-mail invalide';
    return;
  }
  btn.disabled = true;
  btn.innerHTML = '<div class="btn-spinner"></div>Envoi en cours…';
  alertEl.className = 'alert';
  try {
    const res = await fetch('/auth/resend-verification', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email: val })
    });
    const data = await res.json();
    if(res.ok){
      alertEl.className = 'alert success visible';
      alertEl.textContent = 'E-mail envoyé ! Vérifiez votre boîte de réception.';
      btn.innerHTML = 'E-mail envoyé ✓';
    } else {
      alertEl.className = 'alert error visible';
      alertEl.textContent = data.error || 'Erreur lors de l\'envoi.';
      btn.disabled = false;
      btn.innerHTML = 'Renvoyer l\'e-mail';
    }
  } catch(e){
    alertEl.className = 'alert error visible';
    alertEl.textContent = 'Erreur de connexion.';
    btn.disabled = false;
    btn.innerHTML = 'Renvoyer l\'e-mail';
  }
};

initTheme();
window.addEventListener('load', () => { document.body.style.opacity = '1'; });
})();
</script>
</body>
</html>
